<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SurfPicks.com — 2026 WSL Fantasy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#050e18;--card:#0b1e30;--card2:#0e2438;
  --border:rgba(0,210,180,.12);--b2:rgba(255,255,255,.06);
  --teal:#00d4b4;--teal2:#00f0cc;--gold:#f5a623;--coral:#ff4f5e;
  --purple:#7c5cfc;--white:#edf2f7;--muted:#7a9bb5;--dim:#1e3a52;
  --fd:'Bebas Neue',sans-serif;--fc:'Barlow Condensed',sans-serif;--ff:'Barlow',sans-serif;
}
body{background:var(--deep);color:var(--white);font-family:var(--ff);line-height:1.5;min-height:100vh;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,180,.35)}50%{box-shadow:0 0 0 8px rgba(0,212,180,0)}}
#nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  background:rgba(5,14,24,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,210,180,.1);
  display:flex;align-items:center;padding:0 20px;justify-content:space-between}
.logo{display:flex;align-items:baseline;cursor:pointer;user-select:none}
.logo-s{font-family:var(--fd);font-size:1.65rem;color:var(--teal);line-height:1}
.logo-p{font-family:var(--fd);font-size:1.65rem;color:var(--white);line-height:1}
.logo-d{font-size:.55rem;font-family:var(--fc);font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-left:2px;align-self:flex-end;margin-bottom:3px}
.nav-links{display:flex;gap:2px}
.nlink{background:none;border:none;cursor:pointer;font-family:var(--fc);font-weight:600;font-size:.78rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:5px 9px;border-radius:4px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.nlink:hover{color:var(--white)}.nlink.on{color:var(--white);border-bottom-color:var(--teal)}
.nav-r{display:flex;gap:7px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-family:var(--fc);font-weight:700;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:7px;cursor:pointer;transition:all .15s;padding:8px 18px;line-height:1;white-space:nowrap}
.bt{background:var(--teal);color:#050e18}.bt:hover{background:var(--teal2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,212,180,.35)}
.bo{background:transparent;color:var(--teal);border:1.5px solid rgba(0,210,180,.45)}.bo:hover{background:rgba(0,210,180,.07)}
.bg{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--b2)}.bg:hover{background:rgba(255,255,255,.1);color:var(--white)}
.bsm{padding:5px 13px;font-size:.73rem}.blg{padding:13px 30px;font-size:.9rem}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.inp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--white);padding:10px 13px;font-family:var(--ff);font-size:.9rem;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--teal)}.inp::placeholder{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px}
.card2{background:var(--card2);border:1px solid var(--b2);border-radius:8px}
.tag{display:inline-flex;align-items:center;font-family:var(--fc);font-weight:600;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:4px;white-space:nowrap}
.tg-live{background:rgba(255,79,94,.14);color:var(--coral);border:1px solid rgba(255,79,94,.28)}
.tg-done{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.tg-soon{background:rgba(245,166,35,.09);color:var(--gold);border:1px solid rgba(245,166,35,.2)}
.tg-win{background:rgba(0,210,180,.1);color:var(--teal);border:1px solid rgba(0,210,180,.22)}
.tg-adv{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.2)}
.tg-elim{background:rgba(255,79,94,.1);color:var(--coral);border:1px solid rgba(255,79,94,.2)}
.sl{font-family:var(--fc);font-weight:700;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--teal)}
.screen{padding-top:54px;min-height:100vh;animation:fadeIn .3s ease}
.page{max-width:1140px;margin:0 auto;padding:0 18px}
.ev-row{position:relative;overflow:hidden;border-radius:10px;cursor:pointer;display:flex;align-items:stretch;transition:transform .14s}
.ev-row:hover{transform:scale(1.005)}
.ev-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .3s}
.ev-row:hover .ev-bg{transform:scale(1.03)}
.ev-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(5,14,24,.92) 40%,rgba(5,14,24,.3) 100%)}
.ev-left{position:relative;z-index:1;padding:18px 22px;flex:1;display:flex;flex-direction:column;justify-content:center}
.ev-right{position:relative;z-index:1;padding:16px 20px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;min-width:160px}
.ev-name{font-family:var(--fd);font-size:1.6rem;line-height:1;color:var(--white)}
.sc{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--card2);border:1.5px solid var(--b2);border-radius:7px;cursor:pointer;transition:all .11s;user-select:none}
.sc:hover:not(.su){border-color:rgba(0,210,180,.38);background:rgba(0,210,180,.04)}
.sc.ss{border-color:var(--teal);background:rgba(0,210,180,.08);animation:pulse 2s infinite}
.sc.su{opacity:.28;cursor:not-allowed}
.tbar{display:flex;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto}
.tbar::-webkit-scrollbar{height:0}
.tab{background:none;border:none;cursor:pointer;font-family:var(--fc);font-weight:600;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;padding:9px 17px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover:not(.ta){color:var(--white)}.tab.ta{color:var(--white);border-bottom-color:var(--teal)}
.lbh,.lbr{display:grid;grid-template-columns:40px 1fr 76px 64px 58px;gap:8px;align-items:center;padding:8px 15px}
.lbh{font-family:var(--fc);font-weight:600;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.06)}
.lbr{font-size:.86rem;border-bottom:1px solid rgba(255,255,255,.033);transition:background .1s}
.lbr:hover{background:rgba(255,255,255,.02)}.lbr:last-child{border-bottom:none}.lbr.me{background:rgba(0,210,180,.05)!important}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:450px;animation:fadeUp .2s ease;max-height:90vh;overflow-y:auto}
.stat{display:flex;flex-direction:column;align-items:center;padding:13px 18px;background:var(--card2);border:1px solid var(--b2);border-radius:10px}
.av{width:34px;height:34px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-weight:700;font-size:.78rem;color:var(--teal);flex-shrink:0;border:1.5px solid rgba(0,210,180,.18)}
.gt{background:linear-gradient(135deg,var(--teal),#0af 55%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.prog{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pfb{height:100%;background:var(--teal);border-radius:2px;transition:width .5s}
.pslot{display:flex;align-items:center;gap:9px;padding:8px 11px;background:rgba(0,210,180,.03);border:1.5px dashed rgba(0,210,180,.22);border-radius:7px;font-family:var(--fc);font-size:.82rem;color:rgba(0,210,180,.45);font-weight:600}
.pslot.pfilled{background:rgba(0,210,180,.07);border:1.5px solid rgba(0,210,180,.32);color:var(--white)}
.hcard{background:var(--card2);border:1px solid var(--b2);border-radius:9px;padding:12px 14px}
.hs{display:flex;align-items:center;gap:8px;padding:7px 9px;background:rgba(255,255,255,.03);border-radius:6px}
.cd-num{font-family:var(--fd);font-size:2.4rem;line-height:1;color:var(--teal)}
.cd-lbl{font-family:var(--fc);font-weight:700;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:2px}
#loading{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px}
.spin{width:32px;height:32px;border:3px solid rgba(0,210,180,.2);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@media(max-width:680px){.nav-links{display:none}.cd-num{font-size:1.8rem}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spin"></div>
  <div style="font-family:var(--fc);font-size:.8rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">Loading SurfPicks</div>
</div>

<div id="root" style="display:none"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG — set your Supabase project values here
// ═══════════════════════════════════════════════
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';   // e.g. https://xxxx.supabase.co
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
let APP = {
  sc: 'landing',     // current screen
  user: null,        // Supabase auth user
  profile: null,     // profiles row
  events: [],        // all 12 events
  surfers: [],       // full roster
  results: {},       // { eventId: { surferId: 'win'|'advance'|'elim' } }
  picks: {},         // { eventId: surferId } — current user's picks
  leaderboard: [],   // leaderboard rows
  auth: false,       // show auth modal
  am: 'register',   // auth mode
  af: {},            // auth form values
  ae: '',            // auth error
  selSurfer: null,   // picker selection
  fg: 'men',         // filter gender
  dt: 'mr1',         // draw tab
  dg: 'men',         // draw roster gender
  pt: 'main',        // picks tab
  lt: 'main',        // lb tab
  toast: null,
  loading: false,
};

// ─────────────────────────────────────────────
// INIT — load all data from Supabase
// ─────────────────────────────────────────────
async function init() {
  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    APP.user = session.user;
    await loadProfile();
    await loadUserPicks();
  }

  // Load shared data (events, surfers, results, leaderboard)
  await Promise.all([loadEvents(), loadSurfers(), loadResults(), loadLeaderboard()]);

  // Subscribe to real-time result updates
  sb.channel('results')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'results' }, () => {
      loadResults(); loadLeaderboard(); render();
    })
    .subscribe();

  // Subscribe to event status changes
  sb.channel('events')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'events' }, () => {
      loadEvents(); render();
    })
    .subscribe();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('root').style.display = 'block';
  render();

  // Start countdown clock
  if (getCD()) startClock();
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', APP.user.id).single();
  APP.profile = data;
}
async function loadEvents() {
  const { data } = await sb.from('events').select('*').order('stop_num');
  APP.events = data || [];
}
async function loadSurfers() {
  const { data } = await sb.from('surfers').select('*').order('ct_rank');
  APP.surfers = data || [];
}
async function loadResults() {
  const { data } = await sb.from('results').select('*');
  const map = {};
  for (const r of (data || [])) {
    if (!map[r.event_id]) map[r.event_id] = {};
    map[r.event_id][r.surfer_id] = r.result;
  }
  APP.results = map;
}
async function loadUserPicks() {
  if (!APP.user) return;
  const { data } = await sb.from('picks').select('event_id,surfer_id').eq('user_id', APP.user.id);
  APP.picks = {};
  for (const p of (data || [])) APP.picks[p.event_id] = p.surfer_id;
}
async function loadLeaderboard() {
  const { data } = await sb.from('leaderboard').select('*');
  APP.leaderboard = data || [];
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function gs(id) { return APP.surfers.find(s => s.id === id); }
function gr(sid, eid) { return (APP.results[eid] || {})[sid] || null; }
function pts(sid, eid) { const r = gr(sid, eid); const s = gs(sid); if (!r || !s) return null; return r === 'win' ? s.ct_rank * 2 : r === 'advance' ? s.ct_rank : 0; }
function usedIds() { return Object.values(APP.picks); }
function ini(n) { return (n || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(); }
function activeEv() { return APP.events.find(e => e.status === 'active') || null; }
function men() { return APP.surfers.filter(s => s.gender === 'men'); }
function women() { return APP.surfers.filter(s => s.gender === 'women'); }
function getCD() {
  const opens = new Date('2026-04-01T07:00:00+11:00');
  const diff = opens - new Date();
  if (diff <= 0) return null;
  return { d: Math.floor(diff/86400000), h: Math.floor((diff%86400000)/3600000), m: Math.floor((diff%3600000)/60000), s: Math.floor((diff%60000)/1000) };
}

// ─────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────
async function doLogin(email, pw) {
  APP.loading = true; render();
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  APP.loading = false;
  if (error) { APP.ae = error.message; render(); return; }
  APP.user = data.user; APP.auth = false; APP.ae = '';
  await loadProfile(); await loadUserPicks();
  toast('Welcome back! 🤙'); render();
}
async function doRegister(name, email, pw) {
  if (!name || !email || !pw) { APP.ae = 'All fields required'; render(); return; }
  APP.loading = true; render();
  const { data, error } = await sb.auth.signUp({ email, password: pw, options: { data: { name } } });
  APP.loading = false;
  if (error) { APP.ae = error.message; render(); return; }
  APP.user = data.user; APP.auth = false; APP.ae = '';
  await loadProfile(); await loadUserPicks();
  toast('Welcome to SurfPicks, ' + name.split(' ')[0] + '! 🤙'); render();
}
async function doLogout() {
  await sb.auth.signOut();
  APP.user = null; APP.profile = null; APP.picks = {};
  set({ sc: 'landing' });
}
async function savePick(eventId, surferId) {
  if (!APP.user) return;
  const { error } = await sb.from('picks')
    .upsert({ user_id: APP.user.id, event_id: eventId, surfer_id: surferId }, { onConflict: 'user_id,event_id' });
  if (error) { toast('Error saving pick: ' + error.message, 'err'); return; }
  APP.picks[eventId] = surferId;
  APP.selSurfer = null;
  toast('Pick locked in! 🤙');
  await loadLeaderboard();
  render();
}

// ─────────────────────────────────────────────
// STATE + RENDER
// ─────────────────────────────────────────────
function set(u, nosave) { Object.assign(APP, u); render(); }
function toast(msg, t = 'ok') { APP.toast = { msg, t }; render(); setTimeout(() => { APP.toast = null; render(); }, 2800); }
function render() { document.getElementById('root').innerHTML = build(); attach(); }

function build() {
  return navHtml() + `<div class="screen">${scrHtml()}</div>` + (APP.auth ? authModal() : '') + (APP.toast ? toastEl() : '');
}

// ─────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────
function navHtml() {
  const u = APP.user;
  const links = [
    { l: 'Home', k: 'landing' }, { l: 'Schedule', k: 'schedule' }, { l: 'Draw', k: 'draw' },
    ...(u ? [{ l: 'Dashboard', k: 'dash' }, { l: 'My Picks', k: 'picks' }] : []),
    { l: 'Leaderboard', k: 'lb' }, { l: 'Rules', k: 'rules' },
  ];
  return `<nav id="nav">
    <div class="logo" onclick="go('landing')"><span class="logo-s">SURF</span><span class="logo-p">PICKS</span><span class="logo-d">.COM</span></div>
    <div class="nav-links">${links.map(l => `<button class="nlink${APP.sc === l.k ? ' on' : ''}" onclick="go('${l.k}')">${l.l}</button>`).join('')}</div>
    <div class="nav-r">${u
      ? `<span style="font-size:.78rem;color:var(--muted);font-family:var(--fc);font-weight:600">${(APP.profile?.name || '').split(' ')[0]}</span><button class="btn bg bsm" onclick="doLogout()">Logout</button>`
      : `<button class="btn bg bsm" onclick="openA('login')">Sign In</button><button class="btn bt bsm" onclick="openA('register')">Join — $40</button>`}
    </div>
  </nav>`;
}

function scrHtml() {
  switch (APP.sc) {
    case 'landing':  return landing();
    case 'schedule': return schedule();
    case 'draw':     return draw();
    case 'dash':     return APP.user ? dash() : landing();
    case 'picks':    return APP.user ? picks() : landing();
    case 'lb':       return lb();
    case 'rules':    return rules();
    default:         return landing();
  }
}

// ─────────────────────────────────────────────
// LANDING
// ─────────────────────────────────────────────
function landing() {
  const cd = getCD();
  const ae = activeEv();
  const bg = ae ? 'linear-gradient(135deg,#0d2820 0%,#1a5535 55%,#0a2018 100%)' : 'linear-gradient(135deg,#050e18,#0a2030)';
  return `<div>
  <div style="position:relative;overflow:hidden;min-height:560px;display:flex;flex-direction:column;justify-content:flex-end;background:${bg};padding:44px 0 52px">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(5,14,24,1) 0%,rgba(5,14,24,.72) 40%,rgba(5,14,24,.28) 75%,transparent 100%)"></div>
    <svg style="position:absolute;bottom:0;left:0;right:0;opacity:.1" viewBox="0 0 1200 80" preserveAspectRatio="none" height="60"><path d="M0,40 C200,70 400,10 600,40 C800,70 1000,10 1200,40 L1200,80 L0,80 Z" fill="var(--teal)"/></svg>
    <div class="page" style="position:relative;z-index:1">
      <div class="sl" style="margin-bottom:10px">2026 WSL Championship Tour Fantasy</div>
      <div style="font-family:var(--fd);font-size:4.8rem;line-height:.9;color:var(--white);margin-bottom:10px">SEASON<br><span class="gt">OPENS</span><br>APRIL 1</div>
      <div style="font-size:.95rem;color:rgba(255,255,255,.6);margin-bottom:22px">Rip Curl Pro Bells Beach · Stop 1 of 12 · Official draw is live</div>
      ${cd ? `<div style="margin-bottom:24px">
        <div style="font-family:var(--fc);font-weight:700;font-size:.67rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Picks Open In</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${[{n:cd.d,l:'Days'},{n:cd.h,l:'Hours'},{n:cd.m,l:'Min'},{n:cd.s,l:'Sec'}].map((x,i)=>`
          <div style="text-align:center;background:rgba(0,0,0,.35);border:1px solid rgba(0,210,180,.25);border-radius:8px;padding:10px 14px;min-width:58px">
            <div class="cd-num">${String(x.n).padStart(2,'0')}</div>
            <div class="cd-lbl">${x.l}</div>
          </div>${i<3?`<div style="font-family:var(--fd);font-size:1.8rem;color:var(--dim);padding-bottom:8px">:</div>`:''}`).join('')}
        </div>
      </div>` : `<div style="margin-bottom:24px;padding:12px 16px;background:rgba(0,210,180,.1);border:1px solid rgba(0,210,180,.3);border-radius:8px;display:inline-block">
        <span style="font-family:var(--fc);font-weight:700;color:var(--teal);font-size:.9rem">🟢 PICKS ARE OPEN — Make your Bells Beach pick now!</span>
      </div>`}
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${APP.user
          ? `<button class="btn bt blg" onclick="go('picks')">Make My Pick →</button><button class="btn bo blg" onclick="go('draw')">View Draw</button>`
          : `<button class="btn bt blg" onclick="openA('register')">Enter the Season — $40</button><button class="btn bo blg" onclick="go('draw')">View Heat Draw</button>`}
      </div>
    </div>
  </div>

  <div style="background:var(--card);border-bottom:1px solid var(--border)">
    <div class="page" style="display:grid;grid-template-columns:repeat(5,1fr);padding:12px 0">
      ${[{n:'12',l:'CT Stops'},{n:'36M/24W',l:'Field'},{n:'$10K',l:'Grand Prize'},{n:'9',l:'Countries'},{n:'Apr–Dec',l:'Season'}]
        .map((s,i)=>`<div style="text-align:center;${i<4?'border-right:1px solid rgba(255,255,255,.05)':''}">

        const bg = evBgs[i] || 'linear-gradient(135deg,#0a0820,#181438)';
        const isActive = ev.status === 'active', isDone = ev.status === 'completed';
        const typeTag = ev.event_type === 'postseason' ? `<span class="tag" style="background:rgba(124,92,252,.1);color:var(--purple);border:1px solid rgba(124,92,252,.22)">Postseason</span>`

          ? `<div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--coral);box-shadow:0 0 8px rgba(255,79,94,.8)"></div><span style="font-family:var(--fc);font-weight:700;font-size:.68rem;color:var(--coral);letter-spacing:.1em;text-transform:uppercase">LIVE</span></div>`

        const myPick = APP.picks[ev.id];
        const ps = myPick ? gs(myPick) : null;

          <div style="position:absolute;right:150px;top:50%;transform:translateY(-50%);font-family:var(--fd);font-size:5rem;color:rgba(255,255,255,.05);line-height:1;pointer-events:none">${ev.stop_num}</div>
          <div class="ev-left">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">${statusTag}${typeTag}<span style="font-size:.7rem;color:rgba(255,255,255,.38)">${ev.date_range}</span></div>
            <div style="font-family:var(--fc);font-weight:600;font-size:.72rem;color:rgba(255,255,255,.3);margin-bottom:1px">Stop ${ev.stop_num}</div>
            <div class="ev-name">${ev.name}</div>
            <div style="font-size:.78rem;color:rgba(255,255,255,.5);margin-top:2px">${ev.flag} ${ev.location}</div>
          </div>
          <div class="ev-right">
            ${ps ? `<div style="text-align:right">
              <div style="font-family:var(--fc);font-weight:700;font-size:.67rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">My Pick</div>
              <div style="font-size:.88rem;font-weight:600">${ps.name}</div>
              ${pv !== null ? `<div style="font-family:var(--fd);font-size:1.5rem;color:${pv > 0 ? 'var(--teal)' : 'var(--muted)'}">${pv}pts</div>` : ''}
              ${pr ? `<span class="tag ${pr === 'win' ? 'tg-win' : pr === 'elim' ? 'tg-elim' : 'tg-adv'}">${pr === 'win' ? '🏆 WIN' : pr === 'elim' ? '💀 OUT' : 'ADV'}</span>` : ''}
            </div>` : `<span style="font-size:.73rem;color:rgba(255,255,255,.2);font-family:var(--fc)">${ev.date_range.split('–')[0]}</span>`}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

      </div>

    <div class="tbar" style="margin-bottom:18px">
      <button class="tab${tab==='main'?' ta':''}" onclick="set({pt:'main'})">Main Event</button>
      <button class="tab${tab==='single'?' ta':''}" onclick="set({pt:'single'})">Single Contest</button>
    </div>
    ${tab==='main' ? mainPicks() : singlePicks()}
  </div>`;
}

function mainPicks() {
  const cd = getCD(); const ae = activeEv();
  const apk = ae ? (APP.picks[ae.id] ? gs(APP.picks[ae.id]) : null) : null;
  const usedCount = Object.keys(APP.picks).length;
  const sc_tot = APP.leaderboard.find(r => r.user_id === APP.user?.id)?.total_points || 0;
  return `<div style="display:grid;grid-template-columns:290px 1fr;gap:12px;align-items:start">
    <div>
      <div class="card" style="padding:14px 16px;margin-bottom:10px">
        <div class="sl" style="margin-bottom:7px">Season Score</div>
        <div style="font-family:var(--fd);font-size:2.8rem;color:var(--teal);line-height:1">${sc_tot}</div>
        <div style="font-size:.75rem;color:var(--muted)">${usedCount}/12 picks used</div>
        <div class="prog" style="margin-top:9px"><div class="pfb" style="width:${Math.min(100,usedCount/12*100)}%"></div></div>
      </div>
      <div class="sl" style="margin-bottom:8px">All 12 Events</div>
      <div style="display:flex;flex-direction:column;gap:3px">
        ${APP.events.map(ev => {
          const sid = APP.picks[ev.id]; const s = sid ? gs(sid) : null;
          const r = s ? gr(s.id, ev.id) : null; const pv = s ? pts(s.id, ev.id) : null;
          return `<div class="pslot${s?' pfilled':''}">
            <div style="font-family:var(--fc);font-weight:700;font-size:.73rem;color:var(--muted);min-width:17px">${ev.stop_num}</div>
            <div style="font-family:var(--fc);font-weight:700;font-size:.66rem;text-transform:uppercase;min-width:66px;color:var(--muted)">${ev.short_name}</div>
            ${s?`<div style="flex:1;font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
              ${r?`<span class="tag ${r==='win'?'tg-win':r==='elim'?'tg-elim':'tg-adv'}" style="font-size:.56rem">${r==='win'?'WIN':r==='elim'?'OUT':'ADV'}</span>`:''}
              ${pv!==null?`<div style="font-family:var(--fd);font-size:1.05rem;color:var(--teal)">${pv}</div>`:''}`
            :`<div style="flex:1;font-size:.7rem;color:rgba(255,255,255,.15)">${ev.date_range}</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      ${cd ? `<div class="card" style="padding:36px;text-align:center">
        <div style="font-size:2rem;margin-bottom:10px">🏄‍♂️</div>
        <div style="font-family:var(--fd);font-size:1.6rem;margin-bottom:6px">Picks Open April 1</div>
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:20px">Bells Beach competition begins April 1. Use the draw to research your pick.</div>
        <button class="btn bo" onclick="go('draw')">Study the Draw →</button>
      </div>`
      : ae ? `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div><div style="font-family:var(--fd);font-size:1.35rem">${ae.name}</div><div style="font-size:.76rem;color:var(--muted)">${ae.date_range} · ${ae.flag} ${ae.location}</div></div>
          ${apk?`<span class="tag tg-win">✓ Locked In</span>`:''}
        </div>
        ${apk ? `<div class="card" style="padding:18px;border-color:rgba(0,210,180,.22)">
          <div style="display:flex;align-items:center;gap:11px">
            <div class="av" style="width:46px;height:46px;font-size:.95rem">${ini(apk.name)}</div>
            <div><div style="font-family:var(--fd);font-size:1.4rem;color:var(--teal)">${apk.name}</div>
            <div style="font-size:.8rem;color:var(--muted)">Rank ${apk.ct_rank} · If they win → ${apk.ct_rank*2} pts</div></div>
          </div>
        </div>` : inlinePicker(ae.id)}`
      : `<div class="card" style="padding:40px;text-align:center"><div style="font-size:2rem;margin-bottom:8px">🌊</div><div style="font-family:var(--fd);font-size:1.3rem;color:var(--muted)">No Active Event</div></div>`}
    </div>
  </div>`;
}

function inlinePicker(eid) {
  const uid = usedIds(); const g = APP.fg || 'men';
  const surfers = APP.surfers.filter(s => s.gender === g); const sel = APP.selSurfer;
  return `<div class="card" style="padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-family:var(--fc);font-weight:700;font-size:.88rem">Pick Your Surfer</div>
      <div style="display:flex;gap:4px">
        <button class="btn bsm ${g==='men'?'bt':'bg'}" onclick="set({fg:'men'})">Men</button>
        <button class="btn bsm ${g==='women'?'bt':'bg'}" onclick="set({fg:'women'})">Women</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto">
      ${surfers.map(s => {
        const isUsed = uid.includes(s.id); const isSel = sel === s.id;
        return `<div class="sc${isSel?' ss':''}${isUsed?' su':''}" onclick="${isUsed?'':'pickSurfer('+s.id+')'}">
          <div style="font-family:var(--fc);font-weight:800;font-size:.9rem;min-width:22px;text-align:center;color:${isSel?'var(--teal)':'var(--muted)'}">${s.ct_rank}</div>
          <div style="flex:1"><div style="font-weight:600;font-size:.85rem">${s.name}</div><div style="font-size:.68rem;color:var(--muted)">${s.flag} ${s.country}${s.is_wildcard?' · WC':''}</div></div>
          <div style="text-align:right;font-size:.7rem;color:var(--muted)"><div>${s.ct_rank}/<span style="color:var(--gold)">${s.ct_rank*2}</span></div></div>
          ${isUsed?`<span class="tag tg-done" style="font-size:.56rem">Used</span>`:''}
          ${isSel?`<div style="width:16px;height:16px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#050e18;font-weight:700">✓</div>`:''}
        </div>`;
      }).join('')}
    </div>
    ${sel ? `<div style="margin-top:10px;padding:10px 12px;background:rgba(0,210,180,.06);border:1px solid rgba(0,210,180,.18);border-radius:7px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:.83rem">Lock in <strong style="color:var(--teal)">${gs(sel)?.name}</strong>?</div>
      <div style="display:flex;gap:5px">
        <button class="btn bg bsm" onclick="set({selSurfer:null})">Cancel</button>
        <button class="btn bt bsm" onclick="confirmPick(${eid})">Confirm ✓</button>
      </div>
    </div>` : ''}
  </div>`;
}
function singlePicks() {
  return `<div class="card" style="padding:36px;text-align:center">
    <div style="font-size:2rem;margin-bottom:8px">🔥</div>
    <div style="font-family:var(--fd);font-size:1.4rem;margin-bottom:6px">Single Contest Opens April 1</div>
    <div style="font-size:.83rem;color:var(--muted)">Pick 3 surfers per event. All 3 must advance past R1. Resets each event.</div>
  </div>`;
}

// ─────────────────────────────────────────────
// LEADERBOARD (from Supabase view, real-time)
// ─────────────────────────────────────────────
function lb() {
  const rows = APP.leaderboard;
  const completedCount = APP.events.filter(e => e.status === 'completed').length;
  return `<div class="page" style="padding-top:26px;padding-bottom:48px">
    <div style="margin-bottom:18px"><div class="sl">Season Standings</div><div style="font-family:var(--fd);font-size:2.5rem">Leaderboard</div></div>
    ${completedCount === 0 ? `<div class="card" style="margin-bottom:14px;padding:14px;border-color:rgba(245,166,35,.2)">
      <div style="font-family:var(--fc);font-weight:700;font-size:.82rem;color:var(--gold)">⏳ Season Starts April 1</div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:2px">Leaderboard updates automatically as events complete. Updates are real-time.</div>
    </div>` : ''}
    ${rows.length === 0 ? `<div class="card" style="padding:40px;text-align:center">
      <div style="font-size:2rem;margin-bottom:8px">🏄‍♂️</div>
      <div style="font-family:var(--fd);font-size:1.4rem;color:var(--muted)">No picks yet</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:6px">Be the first to register!</div>
    </div>` : `<div class="card">
      ${rows.length >= 3 ? `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--b2)">
        ${rows.slice(0,3).map((row,i)=>`<div style="padding:18px;text-align:center;${i<2?'border-right:1px solid var(--b2)':''}">
          <div style="font-family:var(--fd);font-size:${i===0?'2':'1.5'}rem;color:${i===0?'var(--gold)':i===1?'rgba(180,180,180,1)':'#cd7f32'}">#${i+1}</div>
          <div class="av" style="margin:7px auto;${i===0?'width:42px;height:42px;font-size:.88rem;border-color:rgba(245,166,35,.4)':'width:34px;height:34px;font-size:.74rem'}">${ini(row.name)}</div>
          <div style="font-weight:600;font-size:.84rem">${row.name}</div>
          <div style="font-family:var(--fd);font-size:${i===0?'1.9':'1.4'}rem;color:var(--teal);line-height:1;margin-top:3px">${row.total_points}</div>
          <div style="font-size:.68rem;color:var(--muted)">${row.event_wins} wins</div>
          ${row.is_eliminated?`<span class="tag tg-elim" style="margin-top:5px;font-size:.58rem">Eliminated</span>`:''}
        </div>`).join('')}
      </div>` : ''}
      <div class="lbh"><div>#</div><div>Player</div><div style="text-align:right">Pts</div><div style="text-align:right">Wins</div><div style="text-align:right">Best</div></div>
      ${rows.map((row,i)=>{
        const isMe = APP.user && row.user_id === APP.user.id;
        return `<div class="lbr${isMe?' me':''}">
          <div style="font-family:var(--fc);font-weight:700;font-size:.85rem;color:${i<3?'var(--gold)':'var(--muted)'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
          <div style="display:flex;align-items:center;gap:7px">
            <div class="av" style="width:26px;height:26px;font-size:.65rem;${isMe?'border-color:rgba(0,210,180,.45)':''}">${ini(row.name)}</div>
            <span style="font-size:.85rem;font-weight:${isMe?600:400}">${row.name}${isMe?` <span style="color:var(--teal);font-size:.7rem">(you)</span>`:''}</span>
            ${row.is_eliminated?`<span class="tag tg-elim" style="font-size:.56rem">out</span>`:''}
          </div>
          <div style="text-align:right;font-family:var(--fd);font-size:1.2rem;color:var(--teal)">${row.total_points}</div>
          <div style="text-align:right;font-size:.84rem;color:var(--muted)">${row.event_wins}</div>
          <div style="text-align:right;font-size:.84rem;color:var(--muted)">${row.best_score}</div>
        </div>`;
      }).join('')}
    </div>`}
    <div style="margin-top:10px;text-align:center;font-size:.72rem;color:var(--dim)">Updates in real-time · Tiebreakers: most wins → highest single-event score · ${completedCount} of 12 events scored</div>
  </div>`;
}

// ─────────────────────────────────────────────
// RULES
// ─────────────────────────────────────────────
function rules() {
  return `<div class="page" style="padding-top:28px;padding-bottom:48px;max-width:740px">
    <div style="margin-bottom:22px"><div class="sl">Documentation</div><div style="font-family:var(--fd);font-size:2.5rem">How It Works</div></div>
    <div class="card" style="padding:14px;margin-bottom:12px;border-color:rgba(0,210,180,.2)">
      <div style="font-family:var(--fc);font-weight:700;font-size:.82rem;color:var(--teal);margin-bottom:3px">📋 2026 WSL Format — Sudden Death</div>
      <div style="font-size:.8rem;color:rgba(255,255,255,.65);line-height:1.6">Every heat is sudden death. Lose = eliminated from the event. Men: R1 (seeds 29–36) → R2 (seeds 1–28 join) → R3 → QF → SF → Final. Women: R1 (seeds 9–24) → R2 (seeds 1–8 join) → QF → SF → Final.</div>
    </div>
    <div class="card" style="padding:22px;margin-bottom:10px;border-color:rgba(0,210,180,.18)">
      <div style="font-family:var(--fd);font-size:1.45rem;color:var(--teal);margin-bottom:14px">🎯 Main Event — Season Long</div>
      <div style="font-size:.84rem;color:rgba(255,255,255,.65);line-height:1.7">
        Pick 1 surfer per event to WIN. Can't pick the same surfer twice all season (12 unique picks).<br><br>
        <strong style="color:var(--white)">Scoring:</strong> If they advance past R1 → earn their CT rank as points. If they WIN the event → earn rank × 2.<br><br>
        <strong style="color:var(--coral)">If your pick loses in R1:</strong> You're eliminated. Buy back in via Repechage ($20) for a fresh start.<br><br>
        <strong style="color:var(--gold)">Tiebreakers:</strong> Most event wins → Highest single-event score.<br><br>
        <strong style="color:var(--teal)">Prize:</strong> $10,000 + 3-board PYZEL quiver for the season champion.
      </div>
    </div>
    <div class="card" style="padding:22px;margin-bottom:10px;border-color:rgba(245,166,35,.18)">
      <div style="font-family:var(--fd);font-size:1.45rem;color:var(--gold);margin-bottom:14px">🔥 Single Contest — Per Event</div>
      <div style="font-size:.84rem;color:rgba(255,255,255,.65);line-height:1.7">
        Pick 3 surfers per event ($10 entry). ALL 3 must advance past R1 — if any lose in R1, your score = ZERO for that contest.<br><br>
        <strong style="color:var(--white)">Scoring:</strong> Sum of all 3 surfer CT ranks. Any who win the event score rank × 2.<br><br>
        Resets every event — fresh picks each time.<br><br>
        <strong style="color:var(--gold)">Prize:</strong> $500 per event winner.
      </div>
    </div>
    <div style="margin-top:22px;text-align:center">
      ${APP.user?`<button class="btn bt blg" onclick="go('draw')">Study the Draw →</button>`:`<button class="btn bt blg" onclick="openA('register')">Enter the Season — $40 →</button>`}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// AUTH MODAL
// ─────────────────────────────────────────────
function authModal() {
  const m = APP.am; const f = APP.af || {};
  return `<div class="mover" id="am">
    <div class="modal" style="padding:30px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-family:var(--fd);font-size:1.9rem;color:var(--teal)">${m==='login'?'WELCOME BACK':'JOIN SURFPICKS'}</div>
        <div style="font-size:.8rem;color:var(--muted);margin-top:3px">${m==='login'?'Sign in to your account':'2026 WSL Fantasy · 12 events · $40 entry'}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:9px">
        ${m==='register'?`<input class="inp" id="an" placeholder="Your name" value="${f.n||''}" oninput="APP.af.n=this.value"/>`:''}
        <input class="inp" id="ae2" type="email" placeholder="Email" value="${f.e||''}" oninput="APP.af.e=this.value"/>
        <input class="inp" id="ap" type="password" placeholder="Password" value="${f.p||''}" oninput="APP.af.p=this.value" onkeydown="if(event.key==='Enter')doAuth()"/>
      </div>
      ${APP.ae?`<div style="margin-top:10px;padding:8px 11px;background:rgba(255,79,94,.1);border:1px solid rgba(255,79,94,.2);border-radius:6px;font-size:.8rem;color:var(--coral)">${APP.ae}</div>`:''}
      <button class="btn bt" style="width:100%;margin-top:13px;padding:12px" onclick="doAuth()" ${APP.loading?'disabled':''}>
        ${APP.loading?'Loading…':m==='login'?'Sign In':'Create Account & Start Picking'}
      </button>
      <div style="text-align:center;margin-top:11px;font-size:.78rem;color:var(--muted)">
        ${m==='login'?'No account? ':'Already have one? '}
        <span style="color:var(--teal);cursor:pointer;text-decoration:underline" onclick="APP.am='${m==='login'?'register':'login'}';APP.ae='';render()">${m==='login'?'Sign up':'Sign in'}</span>
      </div>
      <div style="text-align:center;margin-top:8px"><span style="font-size:.7rem;color:var(--dim);cursor:pointer" onclick="APP.auth=false;APP.ae='';render()">← Close</span></div>
    </div>
  </div>`;
}
function toastEl() {
  const t = APP.toast;
  return `<div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:var(--card);border:1px solid ${t.t==='ok'?'rgba(0,210,180,.3)':'rgba(255,79,94,.3)'};border-radius:9px;padding:10px 18px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:fadeUp .22s ease;font-size:.85rem;white-space:nowrap">${t.t==='ok'?'✅':'⚠️'} ${t.msg}</div>`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function go(sc) { if (['dash','picks'].includes(sc) && !APP.user) { APP.auth = true; APP.am = 'register'; render(); return; } APP.sc = sc; APP.selSurfer = null; render(); }
function openA(m) { APP.auth = true; APP.am = m; APP.ae = ''; APP.af = {}; render(); }
function doAuth() { const f = APP.af || {}; APP.am === 'login' ? doLogin(f.e, f.p) : doRegister(f.n, f.e, f.p); }
function evClick(id) { const ev = APP.events.find(e => e.id === id); if (ev?.status === 'active' && APP.user) go('picks'); else go('schedule'); }
function pickSurfer(id) { APP.selSurfer = APP.selSurfer === id ? null : id; render(); }
function confirmPick(eid) { if (!APP.selSurfer || !APP.user) return; savePick(eid, APP.selSurfer); }

function attach() {
  const am = document.getElementById('am');
  if (am) am.addEventListener('click', e => { if (e.target === am) { APP.auth = false; APP.ae = ''; render(); } });
}

function startClock() {
  if (window._clock) clearInterval(window._clock);
  window._clock = setInterval(() => {
    const cd = getCD();
    if (!cd) { clearInterval(window._clock); render(); return; }
    document.querySelectorAll('.cd-num').forEach((el, i) => {
      const vals = [cd.d, cd.h, cd.m, cd.s];
      if (i < vals.length) el.textContent = String(vals[i]).padStart(2,'0');
    });
  }, 1000);
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
window.go=go;window.openA=openA;window.doLogout=doLogout;window.doAuth=doAuth;
window.evClick=evClick;window.pickSurfer=pickSurfer;window.confirmPick=confirmPick;
window.set=set;window.render=render;window.APP=APP;window.startClock=startClock;

init();
</script>
</body>
</html>
