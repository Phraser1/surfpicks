function login(email,pw){const seed=SEED_USERS.find(u=>u.email===email&&u.password===pw);if(seed){set({user:{...seed},showAuth:false,authErr:""});toast("Welcome back, "+seed.name.split(" ")[0]+"! 🤙");return;}const uid=Object.keys(S.users).find(k=>S.users[k].email===email&&S.users[k].password===pw);if(!uid){set({authErr:"Invalid email or password"},true);render();return;}set({user:S.users[uid],showAuth:false,authErr:""});toast("Welcome back!");}
function register(name,email,pw){if(!name||!email||!pw){set({authErr:"All fields required"},true);render();return;}if(Object.values(S.users).find(u=>u.email===email)){set({authErr:"Email already registered"},true);render();return;}const uid="u_"+Date.now();const u={id:uid,name,email,password:pw};S.users[uid]=u;if(!S.picks[uid])S.picks[uid]={};set({user:u,showAuth:false,authErr:""});toast("Welcome to SurfPicks, "+name.split(" ")[0]+"! 🤙");}
function render(){document.getElementById("root").innerHTML=build();attach();}
function build(){return buildNav()+`<div class="screen">${getScreen()}</div>`+(S.showAuth?buildAuthModal():"")+(S.toast?buildToast():"");}
function buildNav(){const u=S.user;const links=[{l:"Events",k:"landing"},{l:"Schedule",k:"schedule"},...(u?[{l:"Dashboard",k:"dash"},{l:"My Picks",k:"picks"}]:[]),{l:"Leaderboard",k:"lb"},{l:"Rules",k:"rules"}];return `<nav id="nav"><div class="logo" onclick="go('landing')"><span class="logo-s">SURF</span><span class="logo-p">PICKS</span><span class="logo-d">.COM</span></div><div class="nav-links">${links.map(l=>`<button class="nlink${S.screen===l.k?" on":""}" onclick="go('${l.k}')">${l.l}</button>`).join("")}</div><div class="nav-r">${u?`<span style="font-size:.78rem;color:var(--muted);font-family:var(--fc);font-weight:600">${u.name.split(" ")[0]}</span><button class="btn bg bsm" onclick="go('dash')">Dashboard</button><button class="btn bg bsm" onclick="doLogout()">Logout</button>`:`<button class="btn bg bsm" onclick="openAuth('login')">Sign In</button><button class="btn bt bsm" onclick="openAuth('register')">Join — $40</button>`}</div></nav>`;}
function getScreen(){switch(S.screen){case"landing":return buildLanding();case"schedule":return buildSchedule();case"dash":return S.user?buildDash():buildLanding();case"picks":return S.user?buildPicks():buildLanding();case"lb":return buildLB();case"rules":return buildRules();default:return buildLanding();}}
function buildLanding(){const ae=activeEv();const done=EVENTS.filter(e=>e.status==="completed");return `<div><div class="hero" style="min-height:460px;background:${ae?ae.bg:"linear-gradient(135deg,#050e18,#0a2030)"}"><div class="hero-ov"></div><svg style="position:absolute;bottom:0;left:0;right:0;opacity:.1" viewBox="0 0 1200 80" preserveAspectRatio="none" height="60"><path d="M0,40 C200,70 400,10 600,40 C800,70 1000,10 1200,40 L1200,80 L0,80 Z" fill="var(--teal)"/><path d="M0,55 C300,30 600,70 900,45 C1050,34 1150,55 1200,50 L1200,80 L0,80 Z" fill="var(--teal)" opacity=".5"/></svg><div class="hero-ct page" style="padding-bottom:0">${ae?`<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px"><div class="ldot"></div><span style="font-family:var(--fc);font-weight:700;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--coral)">Live Now · Stop ${ae.n}</span><span style="font-size:.72rem;color:rgba(255,255,255,.38)">${ae.date}</span></div><div class="htitle" style="margin-bottom:6px">${ae.name}</div><div class="hsub">${ae.flag} ${ae.loc}</div><div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">${S.user?`<button class="btn bt blg" onclick="go('picks')">Make My Pick →</button><button class="btn bo blg" onclick="go('lb')">Leaderboard</button>`:`<button class="btn bt blg" onclick="openAuth('register')">Enter the Season — $40</button><button class="btn bo blg" onclick="go('rules')">How It Works</button>`}</div>`:`<div class="htitle gt" style="font-size:4.8rem;margin-bottom:6px">2026<br>SEASON</div><div class="hsub">Fantasy WSL — 12 events, 9 countries, one champion</div><button class="btn bt blg" onclick="openAuth('register')">Start Playing — $40 Entry</button>`}</div></div><div style="background:var(--card);border-bottom:1px solid var(--border)"><div class="page" style="display:grid;grid-template-columns:repeat(5,1fr);padding:12px 0;gap:0">${[{n:"12",l:"CT Stops"},{n:"9",l:"Countries"},{n:"$10K",l:"Grand Prize"},{n:"36M/24W",l:"Field Size"},{n:"Apr–Dec",l:"Season"}].map((s,i)=>`<div style="text-align:center;${i<4?"border-right:1px solid rgba(255,255,255,.05)":""}"><div style="font-family:var(--fd);font-size:1.5rem;color:var(--teal);line-height:1">${s.n}</div><div style="font-family:var(--fc);font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px">${s.l}</div></div>`).join("")}</div></div><div class="page" style="padding-top:36px;padding-bottom:8px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="sl">2026 CT Season · 12 Stops</div><button class="btn bo bsm" onclick="go('schedule')">Full Schedule →</button></div><div style="display:flex;flex-direction:column;gap:3px">${EVENTS.slice(0,5).map((ev,i)=>buildEvRow(ev,i)).join("")}<div style="padding:12px;text-align:center"><button class="btn bg bsm" onclick="go('schedule')" style="font-size:.75rem">+ 7 more events — View Full Schedule</button></div></div></div><div class="page" style="padding-top:28px;padding-bottom:32px"><div class="sl" style="margin-bottom:16px">Game Modes</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${modeCard({icon:"🎯",c:"var(--teal)",bc:"rgba(0,210,180,.2)",t:"Main Event",sub:"Season Long · $40",d:"Pick 1 surfer per event to WIN. No repeats all season. Score their WSL rank (×2 if they win). Eliminated if your pick exits early.",prize:"$10,000 + 3-board PYZEL quiver"})}${modeCard({icon:"🔥",c:"var(--gold)",bc:"rgba(245,166,35,.2)",t:"Single Contest",sub:"Per Event · $10",d:"Pick 3 surfers per contest. ALL 3 must advance — if any get eliminated, score = zero. Resets each event.",prize:"$500 per event winner"})}</div></div><div style="background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:28px 0"><div class="page"><div class="sl" style="margin-bottom:14px">Scoring System</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--b2);border-radius:10px;overflow:hidden">${[{icon:"🏆",t:"Wins Event",pts:"Rank × 2",ex:"Rank 11 wins → 22 pts",c:"var(--teal)"},{icon:"✅",t:"Advances",pts:"Rank × 1",ex:"Rank 11 adv → 11 pts",c:"var(--gold)"},{icon:"💀",t:"Eliminated",pts:"0 pts",ex:"Out of the season!",c:"var(--coral)"}].map((row,i)=>`<div style="padding:18px;${i<2?"border-right:1px solid var(--b2)":""}"><div style="font-size:1.3rem;margin-bottom:7px">${row.icon}</div><div style="font-family:var(--fd);font-size:1.5rem;color:${row.c}">${row.pts}</div><div style="font-size:.82rem;font-weight:600;margin-top:3px">${row.t}</div><div style="font-size:.75rem;color:var(--muted);margin-top:2px">${row.ex}</div></div>`).join("")}</div><div style="margin-top:12px;padding:11px 14px;background:rgba(0,210,180,.05);border:1px solid rgba(0,210,180,.14);border-radius:8px;font-size:.82rem;color:rgba(255,255,255,.6)"><span style="color:var(--teal);font-weight:600">💡 Strategy:</span> Picking Rank 1 is safe but low ceiling. Pick Rank 22 → they win → <strong style="color:var(--teal)">44 points</strong>. High risk = high reward.</div></div></div><div class="page" style="padding-top:32px;padding-bottom:48px"><div class="sl" style="margin-bottom:14px">Prize Pool</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${[{lbl:"Main Event Champion",prize:"$10,000",sub:"+ 3-board PYZEL quiver",icon:"🏆",c:"var(--teal)"},{lbl:"Women's League Winner",prize:"$2,000",sub:"+ PYZEL custom board",icon:"🏄‍♀️",c:"var(--gold)"},{lbl:"Repechage Winner",prize:"Cash Bonus",sub:"+ SurfPicks branded gear",icon:"🔁",c:"var(--purple)"}].map(p=>`<div class="card" style="padding:20px;text-align:center"><div style="font-size:1.8rem;margin-bottom:7px">${p.icon}</div><div style="font-family:var(--fd);font-size:2rem;color:${p.c}">${p.prize}</div><div style="font-family:var(--fc);font-weight:600;font-size:.8rem;color:var(--white);margin:3px 0 2px">${p.lbl}</div><div style="font-size:.75rem;color:var(--muted)">${p.sub}</div></div>`).join("")}</div></div></div>`;}
function modeCard({icon,c,bc,t,sub,d,prize}){return `<div class="card" style="padding:22px;border-color:${bc}"><div style="display:flex;align-items:center;gap:9px;margin-bottom:13px"><div style="width:38px;height:38px;border-radius:8px;background:${c}15;border:1px solid ${c}28;display:flex;align-items:center;justify-content:center;font-size:1.1rem">${icon}</div><div><div style="font-family:var(--fd);font-size:1.3rem;color:${c}">${t}</div><div style="font-size:.75rem;color:var(--muted);margin-top:-2px">${sub}</div></div></div><div style="font-size:.84rem;color:rgba(255,255,255,.62);line-height:1.55;margin-bottom:12px">${d}</div><div style="padding:8px 11px;background:${c}08;border:1px solid ${c}1a;border-radius:6px"><div style="font-family:var(--fc);font-weight:700;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:${c}">Prize</div><div style="font-size:.82rem;font-weight:600;margin-top:1px">${prize}</div></div></div>`;}
function buildSchedule(){return `<div class="page" style="padding-top:28px;padding-bottom:48px"><div style="margin-bottom:20px"><div class="sl">2026 Championship Tour</div><div style="font-family:var(--fd);font-size:2.6rem;margin-top:2px">Full Schedule</div><div style="font-size:.84rem;color:var(--muted);margin-top:3px">12 events · 9 countries · Apr 1 – Dec 20, 2026</div></div><div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><span class="tag tg-done">✓ Regular Season</span><span class="tag tg-ps">⚡ Postseason (reduced field)</span><span class="tag tg-fin">🏆 Season Finale</span></div><div style="display:flex;flex-direction:column;gap:3px">${EVENTS.map((ev,i)=>buildEvRow(ev,i,true)).join("")}</div><div style="margin-top:16px;padding:12px 16px;background:var(--card2);border-radius:8px;font-size:.8rem;color:var(--muted)">📋 Top 7 of 9 regular-season results count toward postseason qualification. World Titles decided by best 9 of 12 results. Pipeline Masters awards 1.5× points (15,000 pts vs 10,000 standard).</div></div>`;}
function buildEvRow(ev,i,full=false){const isDone=ev.status==="completed";const isActive=ev.status==="active";const typeTag=ev.type==="postseason"?`<span class="tag tg-ps">Postseason</span>`:ev.type==="finale"?`<span class="tag tg-fin">🏆 Finale</span>`:"";const statusTag=isActive?`<div style="display:flex;align-items:center;gap:5px"><div class="ldot"></div><span style="font-family:var(--fc);font-weight:700;font-size:.68rem;color:var(--coral);letter-spacing:.1em;text-transform:uppercase">LIVE</span></div>`:isDone?`<span class="tag tg-done">✓ Complete</span>`:`<span class="tag tg-soon">Upcoming</span>`;const userPick=S.user?(S.picks[S.user.id]||{})[ev.id]:null;const ps=userPick?gs(userPick.sid):null;const pr=ps?gr(ps.id,ev.id):null;const pv=ps?pts(ps.id,ev.id):null;const rowH=isActive?136:full?112:100;return `<div class="ev-row" style="height:${rowH}px;animation:fadeUp ${.15+i*.04}s ease both" onclick="evClick(${ev.id})"><div class="ev-bg" style="background:${ev.bg}"></div><div class="ev-ov"></div><div style="position:absolute;right:${ps?200:140}px;top:50%;transform:translateY(-50%);font-family:var(--fd);font-size:5rem;color:rgba(255,255,255,.05);line-height:1;pointer-events:none;z-index:0">${ev.n}</div><div class="ev-left"><div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">${statusTag}${typeTag}<span style="font-size:.7rem;color:rgba(255,255,255,.38)">${ev.date}</span></div><div class="ev-num">Stop ${ev.n}</div><div class="ev-name">${ev.name}</div><div class="ev-loc">${ev.flag} ${ev.loc}</div>${ev.note&&full?`<div style="font-size:.7rem;color:var(--gold);margin-top:3px;font-family:var(--fc);letter-spacing:.04em">${ev.note}</div>`:""}</div><div class="ev-right">${ps?`<div style="text-align:right"><div style="font-family:var(--fc);font-weight:700;font-size:.67rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">My Pick</div><div style="font-size:.88rem;font-weight:600">${ps.name}</div><div style="font-size:.7rem;color:var(--muted)">Rank ${ps.rank} · ${ps.flag}</div>${pv!==null?`<div style="font-family:var(--fd);font-size:1.5rem;color:${pv>0?"var(--teal)":"var(--muted)"};line-height:1;margin-top:2px">${pv}pts</div>`:""}${pr?`<span class="tag ${pr==="win"?"tg-win":pr==="advance"?"tg-adv":"tg-elim"}" style="margin-top:3px">${pr==="win"?"🏆 WIN":pr==="advance"?"ADV":"💀 OUT"}</span>`:""}</div>`:isActive&&S.user?`<button class="btn bt bsm" onclick="event.stopPropagation();go('picks')">Pick Surfer →</button>`:!isDone&&!isActive?`<span style="font-size:.75rem;color:rgba(255,255,255,.25)">Picks open soon</span>`:!S.user&&isDone?`<span style="font-size:.75rem;color:rgba(255,255,255,.2)">Sign in to see picks</span>`:""}</div></div>`;}
function buildDash(){const u=S.user;const sc=score(u.id);const pk=S.picks[u.id]||{};const usedIds=used(u.id);const ae=activeEv();const apk=ae?(pk[ae.id]||null):null;const allU=[...SEED_USERS,...Object.values(S.users)].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i);const ranked=allU.map(usr=>({usr,sc:score(usr.id)})).sort((a,b)=>b.sc.tot-a.sc.tot||(b.sc.wins-a.sc.wins));const myRank=ranked.findIndex(x=>x.usr.id===u.id)+1;return `<div class="page" style="padding-top:26px;padding-bottom:48px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px"><div><div class="sl">Player Dashboard</div><div style="font-family:var(--fd);font-size:2.2rem;margin-top:1px">${u.name.split(" ")[0]}'s Season</div></div>${ae&&!apk?`<button class="btn bt" onclick="go('picks')">Make My Pick for ${ae.short} →</button>`:""}</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:16px">${[{n:sc.tot,l:"Total Points",c:"var(--teal)"},{n:`#${myRank}`,l:"Season Rank",c:"var(--gold)"},{n:sc.wins,l:"Event Wins",c:"var(--teal)"},{n:usedIds.length+"/12",l:"Picks Used",c:"var(--muted)"}].map(s=>`<div class="stat"><div style="font-family:var(--fd);font-size:1.9rem;line-height:1;color:${s.c}">${s.n}</div><div style="font-family:var(--fc);font-weight:600;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px">${s.l}</div></div>`).join("")}</div>${ae?`<div class="card" style="margin-bottom:12px;overflow:hidden"><div style="height:3px;background:linear-gradient(90deg,var(--teal),#0af)"></div><div style="padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div class="ldot"></div><span class="tag tg-live">Live · Stop ${ae.n}</span><span style="font-size:.76rem;color:var(--muted)">${ae.date}</span></div><div style="font-family:var(--fd);font-size:1.5rem">${ae.name}</div><div style="font-size:.78rem;color:var(--muted)">${ae.flag} ${ae.loc}</div></div>${apk?`<div style="text-align:right"><div style="font-family:var(--fc);font-weight:700;font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">My Pick</div><div style="font-size:.95rem;font-weight:600">${gs(apk.sid)?.name}</div><div style="font-size:.75rem;color:var(--muted)">Rank ${gs(apk.sid)?.rank} · ${gs(apk.sid)?.flag}</div><div style="font-size:.7rem;color:rgba(255,255,255,.3);margin-top:3px">Awaiting result…</div></div>`:`<button class="btn bt" onclick="go('picks')">Make My Pick →</button>`}</div></div>`:""}<div class="sl" style="margin-bottom:10px">Pick History</div><div style="display:flex;flex-direction:column;gap:3px">${EVENTS.filter(ev=>ev.status==="completed"||pk[ev.id]).map(ev=>{const pick=pk[ev.id];const surfer=pick?gs(pick.sid):null;const r=surfer?gr(surfer.id,ev.id):null;const p=surfer?pts(surfer.id,ev.id):null;return `<div class="card2" style="padding:11px 14px;display:flex;align-items:center;gap:10px"><div style="min-width:66px"><div style="font-size:.68rem;color:var(--muted);font-family:var(--fc);letter-spacing:.04em;text-transform:uppercase">${ev.date.split(" ")[0]} ${ev.date.split(" ")[1]}</div><div style="font-size:.85rem;font-weight:600;margin-top:1px">${ev.short}</div></div><div style="flex:1">${surfer?`<div style="display:flex;align-items:center;gap:7px"><div class="av" style="width:28px;height:28px;font-size:.68rem">${ini(surfer.name)}</div><div><div style="font-size:.85rem;font-weight:500">${surfer.name}</div><div style="font-size:.7rem;color:var(--muted)">Rank ${surfer.rank} · ${surfer.flag} ${surfer.co}</div></div></div>`:`<span style="font-size:.8rem;color:var(--muted);font-style:italic">No pick</span>`}</div><div style="display:flex;align-items:center;gap:7px">${r?`<span class="tag ${r==="win"?"tg-win":r==="elim"?"tg-elim":"tg-adv"}">${r==="win"?"🏆 WIN":r==="elim"?"💀 OUT":"ADV"}</span>`:""}${p!==null?`<div style="font-family:var(--fd);font-size:1.5rem;color:${p>0?"var(--teal)":"var(--muted)"}">${p}</div>`:`<span style="font-size:.72rem;color:var(--muted)">—</span>`}</div></div>`;}).join("")||`<div style="padding:24px;text-align:center;color:var(--muted);font-size:.88rem">No picks yet — the season starts April 1! 🤙</div>`}</div><div class="card" style="margin-top:14px;padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-family:var(--fc);font-weight:700;font-size:.8rem">Season Progress — All 12 Stops</div><div style="font-size:.78rem;color:var(--muted)">${usedIds.length} / 12 picks used</div></div><div style="display:flex;gap:4px">${EVENTS.map(ev=>{const pk2=pk[ev.id];const isDone=ev.status==="completed";const isActive=ev.status==="active";return `<div style="flex:1;height:22px;border-radius:3px;background:${pk2?(isDone?"rgba(0,210,180,.6)":"rgba(0,210,180,.3)"):isActive?"rgba(0,210,180,.15)":"rgba(255,255,255,.04)"};display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-size:.58rem;font-weight:700;color:rgba(255,255,255,.4)">${ev.n}</div>`;}).join("")}</div></div>${sc.elim?`<div class="card" style="margin-top:12px;padding:18px;border-color:rgba(255,79,94,.2);background:rgba(255,79,94,.04)"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div style="font-size:1.3rem">💀</div><div style="flex:1"><div style="font-family:var(--fc);font-weight:700;font-size:.88rem;color:var(--coral)">You've been eliminated</div><div style="font-size:.78rem;color:var(--muted);margin-top:1px">Buy back in for $20 and compete for the Repechage prize pool</div></div><button class="btn bd">Buy Back In — $20</button></div></div>`:""}</div>`;}
function buildPicks(){const tab=S.ptab||"main";return `<div class="page" style="padding-top:24px;padding-bottom:48px"><div style="margin-bottom:18px"><div class="sl">Entry</div><div style="font-family:var(--fd);font-size:2.2rem">My Picks</div></div><div class="tbar" style="margin-bottom:18px"><button class="tab${tab==="main"?" ta":""}" onclick="set({ptab:'main'},true);render()">Main Event</button><button class="tab${tab==="single"?" ta":""}" onclick="set({ptab:'single'},true);render()">Single Contest</button></div>${tab==="main"?buildMainPicks():buildSinglePicks()}</div>`;}

function buildLB(){const allU=[...SEED_USERS,...Object.values(S.users)].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i);const rows=allU.map(u=>({u,sc:score(u.id)})).sort((a,b)=>b.sc.tot-a.sc.tot||(b.sc.wins-a.sc.wins)||(b.sc.best-a.sc.best));const tab=S.lbtab||"main";return `<div class="page" style="padding-top:26px;padding-bottom:48px"><div style="margin-bottom:20px"><div class="sl">Season Standings</div><div style="font-family:var(--fd);font-size:2.5rem">Leaderboard</div></div><div class="tbar" style="margin-bottom:14px"><button class="tab${tab==="main"?" ta":""}" onclick="set({lbtab:'main'},true);render()">Main Event</button><button class="tab${tab==="single"?" ta":""}" onclick="set({lbtab:'single'},true);render()">Single Contest</button></div>${tab==="main"?`<div class="card"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--b2)">${rows.slice(0,3).map((row,i)=>`<div style="padding:18px;text-align:center;${i===0?"background:rgba(245,166,35,.04);border-right:1px solid var(--b2)":i===1?"border-right:1px solid var(--b2)":""}"><div style="font-family:var(--fd);font-size:${i===0?"2":"1.5"}rem;color:${i===0?"var(--gold)":i===1?"rgba(180,180,180,1)":"#cd7f32"}">#${i+1}</div><div class="av" style="margin:7px auto;${i===0?"width:42px;height:42px;font-size:.88rem;border-color:rgba(245,166,35,.4)":"width:34px;height:34px;font-size:.74rem"}">${ini(row.u.name)}</div><div style="font-weight:600;font-size:.84rem">${row.u.name}</div><div style="font-family:var(--fd);font-size:${i===0?"1.9":"1.4"}rem;color:var(--teal);line-height:1;margin-top:3px">${row.sc.tot}</div><div style="font-size:.68rem;color:var(--muted)">${row.sc.wins} wins</div>${row.sc.elim?`<span class="tag tg-elim" style="margin-top:5px;font-size:.58rem">Eliminated</span>`:""}</div>`).join("")}</div><div class="lbh"><div>#</div><div>Player</div><div style="text-align:right">Pts</div><div style="text-align:right">Wins</div><div style="text-align:right">Best</div></div>${rows.ma ore = ZERO for that event","Score = sum of each surfer's rank (×2 if any of them win the event)","Contest completely resets for each event — fresh picks every time","🏆 Best score per event wins $500"],scoring:[{l:"All 3 advance",pts:"Sum of ranks",ex:"Ranks 6+9+11 = 26 pts"},{l:"One wins",pts:"+ Rank × 2",ex:"Rank 11 win = +11 bonus"},{l:"Any eliminated",pts:"Score = 0",ex:"Whole pick busted"}]}].map(mode=>`<div class="card" style="padding:22px;margin-bottom:10px;border-color:${mode.bc}"><div style="display:flex;align-items:center;gap:9px;margin-bottom:16px"><div style="font-size:1.3rem">${mode.icon}</div><div style="font-family:var(--fd);font-size:1.45rem;color:${mode.c}">${mode.title}</div></div><div style="display:grid;grid-template-columns:3fr 2fr;gap:14px"><div>${mode.rules.map((r,i)=>`<div style="display:flex;gap:7px;padding:6px 0;${i<mode.rules.length-1?"border-bottom:1px solid rgba(255,255,255,.04)":""}"><div style="min-width:17px;height:17px;border-radius:50%;background:${mode.c}15;color:${mode.c};display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;font-family:var(--fc);flex-shrink:0;margin-top:2px">${i+1}</div><span style="font-size:.83rem;color:rgba(255,255,255,.72);line-height:1.48">${r}</span></div>`).join("")}</div><div><div class="sl" style="margin-bottom:8px;opacity:.7">Scoring</div>${mode.scoring.map(s=>`<div style="margin-bottom:7px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px"><div style="font-family:var(--fc);font-weight:700;font-size:.85rem;color:${mode.c}">${s.pts}</div><div style="font-size:.78rem;font-weight:500;margin-top:1px">${s.l}</div><div style="font-size:.7rem;color:var(--muted)">${s.ex}</div></div>`).join("")}</div></div></div>`).join("")}<div class="card" style="padding:20px;margin-bottom:10px"><div style="font-family:var(--fd);font-size:1.25rem;margin-bottom:12px">🔐 Tiebreaker Rules</div>${["Most event wins (player whose picks won the most events)","Highest single-event score"].map((t,i)=>`<div style="display:flex;gap:8px;padding:7px 0;${i<1?"border-bottom:1px solid rgba(255,255,255,.05)":""}"><div style="min-width:19px;height:19px;border-radius:50%;background:rgba(0,210,180,.1);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;font-family:var(--fc);flex-shrink:0">${i+1}</div><span style="font-size:.83rem;color:rgba(255,255,255,.68)">${t}</span></div>`).join("")}</div><div style="margin-top:24px;text-align:center">${S.user?`<button class="btn bt blg" onclick="go('picks')">Make My Picks →</button>`:`<button class="btn bt blg" onclick="openAuth('register')">Enter the Season — $40 →</button>`}</div></div>`;}
function buildAuthModal(){const m=S.authMode;const f=S.authForm||{};return `<div class="mover" id="am"><div class="modal" style="padding:30px"><div style="text-align:center;margin-bottom:20px"><div style="font-family:var(--fd);font-size:1.9rem;color:var(--teal)">${m==="login"?"WELCOME BACK":"JOIN SURFPICKS"}</div><div style="font-size:.8rem;color:var(--muted);margin-top:3px">${m==="login"?"Sign in to your account":"2026 WSL Fantasy · 12 events · $40 entry"}</div></div><div style="display:flex;flex-direction:column;gap:9px">${m==="register"?`<input class="inp" id="an" placeholder="Your name" value="${f.name||""}" oninput="S.authForm.name=this.value"/>`:""}<input class="inp" id="ae" type="email" placeholder="Email" value="${f.email||""}" oninput="S.authForm.email=this.value"/><input class="inp" id="ap" type="password" placeholder="Password" value="${f.password||""}" oninput="S.authForm.password=this.value" onkeydown="if(event.key==='Enter')doAuth()"/></div>${S.authErr?`<div style="margin-top:10px;padding:8px 11px;background:rgba(255,79,94,.1);border:1px solid rgba(255,79,94,.2);border-radius:6px;font-size:.8rem;color:var(--coral)">${S.authErr}</div>`:""}<button class="btn bt" style="width:100%;margin-top:13px;padding:12px" onclick="doAuth()">${m==="login"?"Sign In":"Create Account & Start Picking"}</button><div style="text-align:center;margin-top:11px;font-size:.78rem;color:var(--muted)">${m==="login"?"No account? ":"Already have one? "}<span style="color:var(--teal);cursor:pointer;text-decoration:underline" onclick="set({authMode:'${m==="login"?"register":"login"}',authErr:''},true);render()">${m==="login"?"Sign up":"Sign in"}</span></div>${m==="login"?`<div style="text-align:center;margin-top:6px;font-size:.7rem;color:var(--dim)">Demo: cole@surf.io / surf</div>`:""}<div style="text-align:center;margin-top:8px"><span style="font-size:.7rem;color:var(--dim);cursor:pointer" onclick="set({showAuth:false,authErr:''})">← Close</span></div></div></div>`;}
function buildToast(){const t=S.toast;return `<div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:var(--card);border:1px solid ${t.t==="ok"?"rgba(0,210,180,.3)":"rgba(255,79,94,.3)"};border-radius:9px;padding:10px 18px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:fadeUp .22s ease;font-size:.85rem;white-space:nowrap">${t.t==="ok"?"✅":"⚠️"} ${t.msg}</div>`;}
function go(sc){if(["dash","picks"].includes(sc)&&!S.user){set({showAuth:true,authMode:"register"});return;}set({screen:sc,selSurfer:null},false);}
function openAuth(m){set({showAuth:true,authMode:m,authErr:"",authForm:{}})}
function doLogout(){set({user:null,screen:"landing",selSurfer:null,singleSel:[]})}
function doAuth(){const f=S.authForm||{};S.authMode==="login"?login(f.email,f.password):register(f.name,f.email,f.password);}
function evClick(id){const ev=EVENTS.find(e=>e.id===id);if(ev?.status==="active"&&S.user)go("picks");else go("schedule");}
function pickSurfer(id){set({selSurfer:S.selSurfer===id?null:id},true);render();}
function toggleSingle(id){const s=S.singleSel||[];if(s.includes(id))set({singleSel:s.filter(x=>x!==id)},true);else if(s.length<3)set({singleSel:[...s,id]},true);render();}
function confirmPick(eid){if(!S.selSurfer||!S.user)return;S.picks[S.user.id][eid]={sid:S.selSurfer};set({selSurfer:null});toast("Pick locked in! 🤙");}
function confirmSingle(eid){const s=S.singleSel||[];if(s.length!==3||!S.user)return;if(!S.spicks[S.user.id])S.spicks[S.user.id]={};S.spicks[S.user.id][eid]={sids:[...s]};set({singleSel:[]});toast("3 picks locked for the contest! 🔥");}
function attach(){const am=document.getElementById("am");if(am)am.addEventListener("click",e=>{if(e.target===am)set({showAuth:false,authErr:""});});}
loadState();render();
window.go=go;window.openAuth=openAuth;window.doLogout=doLogout;window.doAuth=doAuth;
window.evClick=evClick;window.pickSurfer=pickSurfer;window.toggleSingle=toggleSingle;
window.confirmPick=confirmPick;window.confirmSingle=confirmSingle;
window.set=set;window.render=render;window.S=S;
</script>
</body>
</html>
