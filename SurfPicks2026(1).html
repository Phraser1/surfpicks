<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#050e18;--card:#0b1e30;--card2:#0e2438;
  --border:rgba(0,210,180,.12);--b2:rgba(255,255,255,.06);
  --teal:#00d4b4;--teal2:#00f0cc;--gold:#f5a623;--coral:#ff4f5e;
  --purple:#7c5cfc;--white:#edf2f7;--muted:#7a9bb5;--dim:#1e3a52;
  --fd:'Bebas Neue',sans-serif;--fc:'Barlow Condensed',sans-serif;--ff:'Barlow',sans-serif;
}
body{background:var(--deep);color:var(--white);font-family:var(--ff);line-height:1.5;min-height:100vh;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,180,.35)}50%{box-shadow:0 0 0 8px rgba(0,212,180,.0)}}
#nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  background:rgba(5,14,24,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,210,180,.1);
  display:flex;align-items:center;padding:0 20px;justify-content:space-between}
.logo{display:flex;align-items:baseline;cursor:pointer;user-select:none}
.logo-s{font-family:var(--fd);font-size:1.65rem;color:var(--teal);line-height:1}
.logo-p{font-family:var(--fd);font-size:1.65rem;color:var(--white);line-height:1}
.logo-d{font-size:.55rem;font-family:var(--fc);font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-left:2px;align-self:flex-end;margin-bottom:3px}
.nav-links{display:flex;gap:2px}
.nlink{background:none;border:none;cursor:pointer;font-family:var(--fc);font-weight:600;font-size:.78rem;
  letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:5px 9px;border-radius:4px;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.nlink:hover{color:var(--white)}.nlink.on{color:var(--white);border-bottom-color:var(--teal)}
.nav-r{display:flex;gap:7px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-family:var(--fc);
  font-weight:700;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;border:none;
  border-radius:7px;cursor:pointer;transition:all .15s;padding:8px 18px;line-height:1;white-space:nowrap}
.bt{background:var(--teal);color:#050e18}.bt:hover{background:var(--teal2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,212,180,.35)}
.bo{background:transparent;color:var(--teal);border:1.5px solid rgba(0,210,180,.45)}.bo:hover{background:rgba(0,210,180,.07)}
.bg{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--b2)}.bg:hover{background:rgba(255,255,255,.1);color:var(--white)}
.bsm{padding:5px 13px;font-size:.73rem}.blg{padding:13px 30px;font-size:.9rem}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.inp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;
  color:var(--white);padding:10px 13px;font-family:var(--ff);font-size:.9rem;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--teal)}.inp::placeholder{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px}
.card2{background:var(--card2);border:1px solid var(--b2);border-radius:8px}
.tag{display:inline-flex;align-items:center;font-family:var(--fc);font-weight:600;
  font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:4px;white-space:nowrap}
.tg-live{background:rgba(255,79,94,.14);color:var(--coral);border:1px solid rgba(255,79,94,.28)}
.tg-done{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.tg-soon{background:rgba(245,166,35,.09);color:var(--gold);border:1px solid rgba(245,166,35,.2)}
.tg-ps{background:rgba(124,92,252,.1);color:var(--purple);border:1px solid rgba(124,92,252,.22)}
.tg-fin{background:rgba(0,210,180,.1);color:var(--teal);border:1px solid rgba(0,210,180,.22)}
.tg-win{background:rgba(0,210,180,.1);color:var(--teal);border:1px solid rgba(0,210,180,.22)}
.tg-adv{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.2)}
.tg-elim{background:rgba(255,79,94,.1);color:var(--coral);border:1px solid rgba(255,79,94,.2)}
.sl{font-family:var(--fc);font-weight:700;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--teal)}
.screen{padding-top:54px;min-height:100vh;animation:fadeIn .3s ease}
.page{max-width:1140px;margin:0 auto;padding:0 18px}
.hero{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,14,24,1) 0%,rgba(5,14,24,.72) 40%,rgba(5,14,24,.28) 75%,transparent 100%)}
.hero-ct{position:relative;z-index:1}
.ev-row{position:relative;overflow:hidden;border-radius:10px;cursor:pointer;display:flex;align-items:stretch;transition:transform .14s}
.ev-row:hover{transform:scale(1.005)}
.ev-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .3s}
.ev-row:hover .ev-bg{transform:scale(1.03)}
.ev-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(5,14,24,.92) 40%,rgba(5,14,24,.3) 100%)}
.ev-left{position:relative;z-index:1;padding:18px 22px;flex:1;display:flex;flex-direction:column;justify-content:center}
.ev-right{position:relative;z-index:1;padding:16px 20px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;min-width:160px}
.ev-name{font-family:var(--fd);font-size:1.6rem;line-height:1;color:var(--white)}
.sc{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--card2);border:1.5px solid var(--b2);border-radius:7px;cursor:pointer;transition:all .11s;user-select:none}
.sc:hover:not(.su){border-color:rgba(0,210,180,.38);background:rgba(0,210,180,.04)}
.sc.ss{border-color:var(--teal);background:rgba(0,210,180,.08);animation:pulse 2s infinite}
.sc.su{opacity:.28;cursor:not-allowed}
.tbar{display:flex;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto}
.tbar::-webkit-scrollbar{height:0}
.tab{background:none;border:none;cursor:pointer;font-family:var(--fc);font-weight:600;font-size:.82rem;
  letter-spacing:.06em;text-transform:uppercase;padding:9px 17px;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover:not(.ta){color:var(--white)}.tab.ta{color:var(--white);border-bottom-color:var(--teal)}
.lbh,.lbr{display:grid;grid-template-columns:40px 1fr 76px 64px 58px;gap:8px;align-items:center;padding:8px 15px}
.lbh{font-family:var(--fc);font-weight:600;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.06)}
.lbr{font-size:.86rem;border-bottom:1px solid rgba(255,255,255,.033);transition:background .1s}
.lbr:hover{background:rgba(255,255,255,.02)}.lbr:last-child{border-bottom:none}.lbr.me{background:rgba(0,210,180,.05)!important}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:450px;animation:fadeUp .2s ease;max-height:90vh;overflow-y:auto}
.stat{display:flex;flex-direction:column;align-items:center;padding:13px 18px;background:var(--card2);border:1px solid var(--b2);border-radius:10px}
.av{width:34px;height:34px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-weight:700;font-size:.78rem;color:var(--teal);flex-shrink:0;border:1.5px solid rgba(0,210,180,.18)}
.gt{background:linear-gradient(135deg,var(--teal),#0af 55%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.prog{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pfb{height:100%;background:var(--teal);border-radius:2px;transition:width .5s}
.pslot{display:flex;align-items:center;gap:9px;padding:8px 11px;background:rgba(0,210,180,.03);border:1.5px dashed rgba(0,210,180,.22);border-radius:7px;font-family:var(--fc);font-size:.82rem;color:rgba(0,210,180,.45);font-weight:600}
.pslot.pfilled{background:rgba(0,210,180,.07);border:1.5px solid rgba(0,210,180,.32);color:var(--white)}
.hcard{background:var(--card2);border:1px solid var(--b2);border-radius:9px;padding:12px 14px}
.hs{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:6px}
.cd-num{font-family:var(--fd);font-size:2.6rem;line-height:1;color:var(--teal)}
.cd-lbl{font-family:var(--fc);font-weight:700;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:2px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@media(max-width:680px){.nav-links{display:none}.cd-num{font-size:1.8rem}}

function gs(id){return ALL.find(s=>s.id===id)}
function gr(sid,eid){return({} [eid]||{})[sid]||null}
function pts(sid,eid){const r=gr(sid,eid);const s=gs(sid);if(!r||!s)return null;return r==="win"?s.rank*2:r==="adv"?s.rank:0;}
function calc(uid){const p=S.picks[uid]||{};let tot=0,wins=0,best=0,elim=false;for(const[eid,pk]of Object.entries(p)){const r=gr(pk.sid,Number(eid));if(!r)continue;const s=gs(pk.sid);if(!s)continue;const v=pts(pk.sid,Number(eid));tot+=v;if(v>best)best=v;if(r==="win")wins++;if(r==="elim")elim=true;}return{tot,wins,best,elim};}
function usedIds(uid){return Object.values(S.picks[uid]||{}).map(v=>v.sid);}
function ini(n){return(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function login(email,pw){
  const seed=SEED_USERS.find(u=>u.email===email&&u.pw===pw);
  if(seed){set({user:{...seed},auth:false,ae:""});toast("Welcome back, "+seed.n.split(" ")[0]+"! 🤙");return;}
  const uid=Object.keys(S.users).find(k=>S.users[k].email===email&&S.users[k].pw===pw);
  if(!uid){set({ae:"Invalid email or password"},true);render();return;}
  set({user:S.users[uid],auth:false,ae:""});toast("Welcome back!");
}
function register(name,email,pw){
  if(!name||!email||!pw){set({ae:"All fields required"},true);render();return;}
  if(Object.values(S.users).find(u=>u.email===email)){set({ae:"Email already registered"},true);render();return;}
  const uid="u_"+Date.now();const u={id:uid,n:name,email,pw};
  S.users[uid]=u;if(!S.picks[uid])S.picks[uid]={};
  set({user:u,auth:false,ae:""});toast("Welcome to SurfPicks, "+name.split(" ")[0]+"! 🤙");
}

}

    </div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--b2)">
        ${rows.slice(0,3).map((row,i)=>`
        <div style="padding:18px;text-align:center;${i<2?"border-right:1px solid var(--b2)":""}">
          <div style="font-family:var(--fd);font-size:${i===0?"2":"1.5"}rem;color:${i===0?"var(--gold)":i===1?"rgba(180,180,180,1)":"#cd7f32"}">#${i+1}</div>
          <div class="av" style="margin:7px auto;${i===0?"width:42px;height:42px;font-size:.88rem;border-color:rgba(245,166,35,.4)":"width:34px;height:34px;font-size:.74rem"}">${ini(row.u.n||row.u.name||"?")}</div>
          <div style="font-weight:600;font-size:.84rem">${row.u.n||row.u.name}</div>
          <div style="font-family:var(--fd);font-size:${i===0?"1.9":"1.4"}rem;color:var(--teal);line-height:1;margin-top:3px">—</div>
          <div style="font-size:.68rem;color:var(--muted)">0 events</div>
        </div>`).join("")}
      </div>
      <div class="lbh"><div>#</div><div>Player</div><div style="text-align:right">Pts</div><div style="text-align:right">Wins</div><div style="text-align:right">Best</div></div>
      ${rows.map((row,i)=>{
        const isMe=S.user&&row.u.id===S.user.id;const name=row.u.n||row.u.name||"?";
        return `<div class="lbr${isMe?" me":""}">
          <div style="font-family:var(--fc);font-weight:700;font-size:.85rem;color:${i<3?"var(--gold)":"var(--muted)"}">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
          <div style="display:flex;align-items:center;gap:7px">
            <div class="av" style="width:26px;height:26px;font-size:.65rem;${isMe?"border-color:rgba(0,210,180,.45)":""}">${ini(name)}</div>
            <span style="font-size:.85rem;font-weight:${isMe?600:400}">${name}${isMe?` <span style="color:var(--teal);font-size:.7rem">(you)</span>`:""}</span>
          </div>
          <div style="text-align:right;font-family:var(--fd);font-size:1.2rem;color:var(--teal)">—</div>
          <div style="text-align:right;font-size:.84rem;color:var(--muted)">—</div>
          <div style="text-align:right;font-size:.84rem;color:var(--muted)">—</div>
        </div>`;
      }).join("")}
    </div>
    <div style="margin-top:10px;text-align:center;font-size:.72rem;color:var(--dim)">Tiebreakers: Most event wins → Highest single-event score · 0 of 12 events scored</div>
  </div>`;
}

// ═══════════════════════
// RULES
// ═══════════════════════
function rules(){
  return `<div class="page" style="padding-top:28px;padding-bottom:48px;max-width:740px">
    <div style="margin-bottom:22px"><div class="sl">Documentation</div><div style="font-family:var(--fd);font-size:2.5rem">How It Works</div></div>
    <div class="card" style="padding:14px;margin-bottom:12px;border-color:rgba(0,210,180,.2);background:rgba(0,210,180,.03)">
      <div style="font-family:var(--fc);font-weight:700;font-size:.82rem;color:var(--teal);margin-bottom:3px">📋 2026 WSL Format</div>
      <div style="font-size:.8rem;color:rgba(255,255,255,.65);line-height:1.6">Every heat is <b style="color:var(--white)">sudden death</b>. Men: R1 (seeds 29–36 + WC) → R2 (seeds 1–28 join) → R3 → QF → SF → Final. Women: R1 (seeds 9–24 + WC) → R2 (seeds 1–8 join) → QF → SF → Final. Lose once = done for the event.</div>
    </div>
    ${[
      {icon:"🎯",c:"var(--teal)",bc:"rgba(0,210,180,.18)",title:"Main Event — Season Long",rules:["Pick 1 surfer per WSL event to WIN","Cannot pick the same surfer twice all season (12 unique picks)","Surfer passes R1: Score their CT seed rank as points","Surfer WINS the event: Score seed × 2","⚠️ Surfer loses in R1: You're eliminated from the season","🔁 Repechage: Buy back in for $20 — fresh start, no reused picks","🏆 Highest total after all 12 events wins $10,000 + PYZEL quiver"],scoring:[{l:"Wins event",pts:"Seed × 2",ex:"Seed 11 wins = 22 pts"},{l:"Advances (past R1)",pts:"Seed × 1",ex:"Seed 11 adv = 11 pts"},{l:"Eliminated in R1",pts:"0 / Out",ex:"Buy back for $20"}]},
      {icon:"🔥",c:"var(--gold)",bc:"rgba(245,166,35,.18)",title:"Single Contest — Per Event",rules:["Pick 3 surfers each event ($10 per event)","ALL 3 must pass R1 — if any lose in R1, score = ZERO","Score = sum of all 3 seed ranks (×2 if any of them wins)","Resets each event — fresh picks every time","Best score per event wins $500"],scoring:[{l:"All 3 advance",pts:"Sum of seeds",ex:"Seeds 6+9+11 = 26 pts"},{l:"Any surfer wins",pts:"+seed × 2",ex:"Seed 11 win = +11"},{l:"Any R1 loss",pts:"Score = 0",ex:"Entire ticket busted"}]},
    ].map(mode=>`
    <div class="card" style="padding:22px;margin-bottom:10px;border-color:${mode.bc}">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:14px">
        <div style="font-size:1.3rem">${mode.icon}</div><div style="font-family:var(--fd);font-size:1.45rem;color:${mode.c}">${mode.title}</div>
      </div>
      <div style="display:grid;grid-template-columns:3fr 2fr;gap:14px">
        <div>${mode.rules.map((r,i)=>`<div style="display:flex;gap:7px;padding:6px 0;${i<mode.rules.length-1?"border-bottom:1px solid rgba(255,255,255,.04)":""}"><div style="min-width:17px;height:17px;border-radius:50%;background:${mode.c}15;color:${mode.c};display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;font-family:var(--fc);flex-shrink:0;margin-top:2px">${i+1}</div><span style="font-size:.83rem;color:rgba(255,255,255,.72);line-height:1.48">${r}</span></div>`).join("")}</div>
        <div><div class="sl" style="margin-bottom:8px;opacity:.7">Scoring</div>${mode.scoring.map(s=>`<div style="margin-bottom:7px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px"><div style="font-family:var(--fc);font-weight:700;font-size:.85rem;color:${mode.c}">${s.pts}</div><div style="font-size:.78rem;font-weight:500;margin-top:1px">${s.l}</div><div style="font-size:.7rem;color:var(--muted)">${s.ex}</div></div>`).join("")}</div>
      </div>
    </div>`).join("")}
    <div style="margin-top:22px;text-align:center">
      ${S.user?`<button class="btn bt blg" onclick="go('draw')">Study the Draw →</button>`:`<button class="btn bt blg" onclick="openA('register')">Enter the Season — $40 →</button>`}
    </div>
  </div>`;
}

// ═══════════════════════
// AUTH + TOAST
// ═══════════════════════
function authModal(){
  const m=S.am;const f=S.af||{};
  return `<div class="mover" id="am">
    <div class="modal" style="padding:30px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-family:var(--fd);font-size:1.9rem;color:var(--teal)">${m==="login"?"WELCOME BACK":"JOIN SURFPICKS"}</div>
        <div style="font-size:.8rem;color:var(--muted);margin-top:3px">${m==="login"?"Sign in to your account":"2026 WSL Fantasy · 12 events · $40 entry"}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:9px">
        ${m==="register"?`<input class="inp" id="an" placeholder="Your name" value="${f.n||""}" oninput="S.af.n=this.value"/>`:""}
        <input class="inp" id="ae2" type="email" placeholder="Email" value="${f.e||""}" oninput="S.af.e=this.value"/>
        <input class="inp" id="ap" type="password" placeholder="Password" value="${f.p||""}" oninput="S.af.p=this.value" onkeydown="if(event.key==='Enter')doAuth()"/>
      </div>
      ${S.ae?`<div style="margin-top:10px;padding:8px 11px;background:rgba(255,79,94,.1);border:1px solid rgba(255,79,94,.2);border-radius:6px;font-size:.8rem;color:var(--coral)">${S.ae}</div>`:""}
      <button class="btn bt" style="width:100%;margin-top:13px;padding:12px" onclick="doAuth()">${m==="login"?"Sign In":"Create Account & Start Picking"}</button>
      <div style="text-align:center;margin-top:11px;font-size:.78rem;color:var(--muted)">
        ${m==="login"?"No account? ":"Already have one? "}
        <span style="color:var(--teal);cursor:pointer;text-decoration:underline" onclick="set({am:'${m==="login"?"register":"login"}',ae:''},true);render()">${m==="login"?"Sign up":"Sign in"}</span>
      </div>
      <div style="text-align:center;margin-top:8px"><span style="font-size:.7rem;color:var(--dim);cursor:pointer" onclick="set({auth:false,ae:''})">← Close</span></div>
    </div>
  </div>`;
}
function toastEl(){
  const t=S.toast;
  return `<div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:var(--card);border:1px solid ${t.t==="ok"?"rgba(0,210,180,.3)":"rgba(255,79,94,.3)"};border-radius:9px;padding:10px 18px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:fadeUp .22s ease;font-size:.85rem;white-space:nowrap">${t.t==="ok"?"✅":"⚠️"} ${t.msg}</div>`;
}

function go(sc){if(["dash","picks"].includes(sc)&&!S.user){set({auth:true,am:"register"});return;}set({sc,sel:null},false);}
function openA(m){set({auth:true,am:m,ae:"",af:{}})}
function doOut(){set({user:null,sc:"landing",sel:null,ss:[]})}
function doAuth(){const f=S.af||{};S.am==="login"?login(f.e,f.p):register(f.n,f.e,f.p);}
function evClick(id){const ev=EVENTS.find(e=>e.id===id);if(ev?.status==="active"&&S.user)go("picks");else go("schedule");}
function pickSurfer(id){set({sel:S.sel===id?null:id},true);render();}
function confirmPick(eid){if(!S.sel||!S.user)return;S.picks[S.user.id][eid]={sid:S.sel};set({sel:null});toast("Pick locked in! 🤙");}

function attach(){
  const am=document.getElementById("am");
  if(am)am.addEventListener("click",e=>{if(e.target===am)set({auth:false,ae:""});});
  // Start countdown tick — updates numbers in-place, no full re-render
  if(getCD())startClock();
}

function startClock(){
  if(window._clockTimer)clearInterval(window._clockTimer);
  window._clockTimer=setInterval(()=>{
    const cd=getCD();
    if(!cd){clearInterval(window._clockTimer);render();return;}
    const vals=[cd.d,cd.h,cd.m,cd.s];
    // Update all countdown number elements without touching the rest of the DOM
    document.querySelectorAll(".cd-num").forEach((el,i)=>{
      if(i<vals.length)el.textContent=String(vals[i]).padStart(2,"0");
    });
  },1000);
}
loadState();render();
window.go=go;window.openA=openA;window.doOut=doOut;window.doAuth=doAuth;
window.evClick=evClick;window.pickSurfer=pickSurfer;window.confirmPick=confirmPick;
window.set=set;window.render=render;window.S=S;
</script>
</body>
</html>
