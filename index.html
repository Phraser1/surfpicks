<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--deep:#050e18;--card:#0b1e30;--card2:#0e2438;--b2:rgba(255,255,255,.06);--teal:#00d4b4;--gold:#f5a623;--coral:#ff4f5e;--white:#edf2f7;--muted:#7a9bb5;--dim:#1e3a52;--fd:'Bebas Neue',sans-serif;--fc:'Barlow Condensed',sans-serif;--ff:'Barlow',sans-serif}
body{background:var(--deep);color:var(--white);font-family:var(--ff);min-height:100vh;overflow-x:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,180,.4)}50%{box-shadow:0 0 0 8px rgba(0,212,180,0)}}
.spin{width:30px;height:30px;border:3px solid rgba(0,212,180,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:100;background:rgba(5,14,24,.93);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,210,180,.1);display:flex;align-items:center;padding:0 20px;justify-content:space-between}
.logo{font-family:var(--fd);font-size:1.6rem;cursor:pointer;user-select:none}
.logo span{color:var(--teal)}
.navlinks{display:flex;gap:2px}
.nl{background:none;border:none;cursor:pointer;font-family:var(--fc);font-weight:600;font-size:.78rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:5px 9px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.nl:hover{color:var(--white)}.nl.on{color:var(--white);border-bottom-color:var(--teal)}
.navr{display:flex;gap:7px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;font-family:var(--fc);font-weight:700;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:7px;cursor:pointer;padding:8px 18px;line-height:1;white-space:nowrap;transition:all .14s}
.teal{background:var(--teal);color:#050e18}.teal:hover{background:#00f0cc;transform:translateY(-1px)}
.outline{background:transparent;color:var(--teal);border:1.5px solid rgba(0,210,180,.4)}.outline:hover{background:rgba(0,210,180,.07)}
.ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--b2)}.ghost:hover{background:rgba(255,255,255,.1);color:var(--white)}
.sm{padding:5px 13px;font-size:.73rem}.lg{padding:13px 30px;font-size:.9rem}
.btn:disabled{opacity:.4;cursor:not-allowed}
input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--white);padding:10px 13px;font-family:var(--ff);font-size:.9rem;width:100%;outline:none}
input:focus{border-color:var(--teal)}
input::placeholder{color:var(--muted)}
.card{background:var(--card);border:1px solid rgba(0,210,180,.12);border-radius:12px}
.card2{background:var(--card2);border:1px solid var(--b2);border-radius:8px}
.tag{display:inline-flex;align-items:center;font-family:var(--fc);font-weight:600;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:4px;white-space:nowrap}
.live{background:rgba(255,79,94,.14);color:var(--coral);border:1px solid rgba(255,79,94,.28)}
.soon{background:rgba(245,166,35,.09);color:var(--gold);border:1px solid rgba(245,166,35,.2)}
.done{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.twin{background:rgba(0,210,180,.1);color:var(--teal);border:1px solid rgba(0,210,180,.22)}
.tadv{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.2)}
.telm{background:rgba(255,79,94,.1);color:var(--coral);border:1px solid rgba(255,79,94,.2)}
.sl{font-family:var(--fc);font-weight:700;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--teal)}
.page{max-width:1140px;margin:0 auto;padding:0 18px}
.screen{padding-top:54px;min-height:100vh;animation:fadeIn .3s}
.row{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--card2);border:1.5px solid var(--b2);border-radius:7px;cursor:pointer;transition:all .11s}
.row:hover:not(.used){border-color:rgba(0,210,180,.38);background:rgba(0,210,180,.04)}
.row.sel{border-color:var(--teal);background:rgba(0,210,180,.08);animation:pulse 2s infinite}
.row.used{opacity:.28;cursor:not-allowed}
.tbar{display:flex;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto;scrollbar-width:none}
.tab{background:none;border:none;cursor:pointer;font-family:var(--fc);font-weight:600;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;padding:9px 17px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.on{color:var(--white);border-bottom-color:var(--teal)}
.lbg{display:grid;grid-template-columns:36px 1fr 70px 58px 52px;gap:8px;align-items:center;padding:8px 14px}
.lbh{font-family:var(--fc);font-weight:600;font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.06)}
.lbr{font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.03)}
.lbr.me{background:rgba(0,210,180,.05)!important}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid rgba(0,210,180,.12);border-radius:16px;width:100%;max-width:440px;animation:fadeUp .2s;max-height:90vh;overflow-y:auto;padding:30px}
.av{width:34px;height:34px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-weight:700;font-size:.78rem;color:var(--teal);flex-shrink:0;border:1.5px solid rgba(0,210,180,.18)}
.slot{display:flex;align-items:center;gap:9px;padding:7px 10px;background:rgba(0,210,180,.03);border:1.5px dashed rgba(0,210,180,.22);border-radius:7px}
.slot.filled{background:rgba(0,210,180,.07);border-color:rgba(0,210,180,.32)}
.hcard{background:var(--card2);border:1px solid var(--b2);border-radius:9px;padding:12px 14px}
.hs{display:flex;align-items:center;gap:8px;padding:7px 9px;background:rgba(255,255,255,.03);border-radius:6px}
.cd{font-family:var(--fd);font-size:2.4rem;line-height:1;color:var(--teal)}
.cdl{font-family:var(--fc);font-weight:700;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:2px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@media(max-width:680px){.navlinks{display:none}}
</style>
</head>
<body>
<div id="app" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px">
  <div class="spin"></div>
  <div style="font-family:var(--fc);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Loading SurfPicks…</div>
</div>
<script>
// ─── CONFIG ───────────────────────────────────────────
const SB_URL  = 'https://pjvscmlidhrkgfzfrvtz.supabase.co';
const SB_ANON = 'sb_publishable_WJLdJ8qZOeHDZKqDi71F3w_93x82GsZ';

// ─── DRAW DATA ────────────────────────────────────────
const MR1=[{h:1,adv:'R2·9',s:[{n:"Mateus Herdy",f:"🇧🇷"},{n:"Liam O'Brien",f:"🇦🇺"}]},{h:2,adv:'R2·6',s:[{n:"Oscar Berry",f:"🇦🇺"},{n:"Dane Henry",f:"🇦🇺",wc:1}]},{h:3,adv:'R2·3',s:[{n:"Luke Thompson",f:"🇿🇦"},{n:"Ramzi Boukhiam",f:"🇲🇦",wc:1}]},{h:4,adv:'R2·13',s:[{n:"Callum Robson",f:"🇦🇺"},{n:"Wildcard",f:"❓",wc:1}]}];
const MR2=[{h:1,s:["Miguel Pupo","Joel Vaughan"]},{h:2,s:["Barron Mamiya","Seth Moniz"]},{h:3,s:["Jordy Smith","R1H3 Winner"]},{h:4,s:["Ethan Ewing","George Pittar"]},{h:5,s:["Jake Marshall","Joao Chianca"]},{h:6,s:["Griffin Colapinto","R1H2 Winner"]},{h:7,s:["Cole Houshmand","Adriano Muniz"]},{h:8,s:["Kanoa Igarashi","Morgan Ciblic"]},{h:9,s:["Yago Dora","R1H1 Winner"]},{h:10,s:["Crosby Colapinto","Marco Mignot"]},{h:11,s:["Leo Fioravanti","Kauli Vaast"]},{h:12,s:["Filipe Toledo","Ezekiel Hanneman"]},{h:13,s:["Italo Ferreira","R1H4 Winner"]},{h:14,s:["Gabriel Medina WC","Alan Cleland"]},{h:15,s:["Connor O'Leary","Rio Waida"]},{h:16,s:["Jack Robinson","Samuel Pupo"]}];
const WR1=[{h:1,adv:'R2·5',s:[{n:"Yolanda Hopkins",f:"🇵🇹"},{n:"Sally Fitzgibbons",f:"🇦🇺"}]},{h:2,adv:'R2·1',s:[{n:"Tya Zebrowski",f:"🇫🇷"},{n:"Alyssa Spencer",f:"🇺🇸"}]},{h:3,adv:'R2·3',s:[{n:"Brisa Hennessy",f:"🇨🇷"},{n:"Francisca Veselko",f:"🇵🇹"}]},{h:4,adv:'R2·7',s:[{n:"Bella Kenworthy",f:"🇺🇸"},{n:"Nadia Erostarbe",f:"🏳️"}]},{h:5,adv:'R2·2',s:[{n:"Vahine Fierro",f:"🇫🇷"},{n:"Anat Lelior",f:"🇮🇱"}]},{h:6,adv:'R2·8',s:[{n:"Sawyer Lindblad",f:"🇺🇸"},{n:"Carissa Moore",f:"🌺",wc:1}]},{h:7,adv:'R2·4',s:[{n:"Luana Silva",f:"🇧🇷"},{n:"Steph Gilmore",f:"🇦🇺",wc:1}]},{h:8,adv:'R2·6',s:[{n:"Lakey Peterson",f:"🇺🇸"},{n:"Wildcard",f:"❓",wc:1}]}];
const WR2=[{h:1,s:["Caroline Marks","R1H2"]},{h:2,s:["BSJ","R1H5"]},{h:3,s:["Gabriela Bryan","R1H3"]},{h:4,s:["Tyler Wright","R1H7"]},{h:5,s:["Molly Picklum","R1H1"]},{h:6,s:["Erin Brooks","R1H8"]},{h:7,s:["Caitlin Simmers","R1H4"]},{h:8,s:["Isabella Nichols","R1H6"]}];

// ─── STATE ────────────────────────────────────────────
let sb;
let A={pg:'home',session:null,profile:null,events:[],surfers:[],results:{},picks:{},allPicks:[],profiles:[],auth:false,am:'register',af:{},ae:'',busy:false,sel:null,fg:'men',dt:'mr1',dg:'men',pt:'main',toast:null};

// ─── BOOT ─────────────────────────────────────────────
window.addEventListener('load', async function() {
  try {
    sb = supabase.createClient(SB_URL, SB_ANON);
  } catch(e) {
    show('<div style="padding:40px;text-align:center;color:var(--coral)">Failed to connect: ' + e.message + '</div>');
    return;
  }

  // Get session
  try { var r = await sb.auth.getSession(); A.session = r.data.session; } catch(e) {}

  // Render immediately — don't wait for data
  render();

  // Load data in background
  loadData();

  // Auth listener
  sb.auth.onAuthStateChange(async function(ev, session) {
    A.session = session;
    if (session) { await safeLoad('profiles', function(d){ A.profile = d; }, true); await loadPicks(); }
    else { A.profile = null; A.picks = {}; }
    render();
  });

  // Realtime
  sb.channel('x').on('postgres_changes',{event:'*',schema:'public',table:'results'},function(){ loadData(); }).subscribe();
});

async function loadData() {
  await safeLoad('events', function(d){ A.events = (d||[]).sort(function(a,b){ return (a.stop_num||0)-(b.stop_num||0); }); });
  await safeLoad('surfers', function(d){ A.surfers = (d||[]).sort(function(a,b){ return srank(a)-srank(b); }); });
  await safeLoad('results', function(d){ A.results={}; (d||[]).forEach(function(r){ if(!A.results[r.event_id])A.results[r.event_id]={}; A.results[r.event_id][r.surfer_id]=r.result; }); });
  await safeLoad('picks', function(d){ A.allPicks=d||[]; }, false, 'user_id,event_id,surfer_id');
  await safeLoad('profiles', function(d){ A.profiles=d||[]; }, false, 'id,name');
  if (A.session) await loadPicks();
  render();
}

async function loadPicks() {
  if (!A.session) return;
  try {
    var r = await sb.from('picks').select('event_id,surfer_id').eq('user_id', A.session.user.id);
    A.picks = {};
    (r.data||[]).forEach(function(p){ A.picks[p.event_id] = p.surfer_id; });
    if (!A.profile) await safeLoad('profiles', function(d){ A.profile = d; }, true);
  } catch(e) { console.warn('loadPicks', e); }
}

async function safeLoad(table, fn, single, cols) {
  try {
    var q = sb.from(table).select(cols||'*');
    if (single && A.session) q = q.eq('id', A.session.user.id).single();
    var r = await q;
    if (!r.error) fn(r.data);
    else console.warn(table, r.error.message);
  } catch(e) { console.warn(table, e.message); }
}

// ─── HELPERS ──────────────────────────────────────────
function srank(s){ return s.rank||s.surfer_rank||s.ct_rank||0; }
function getSurfer(id){ return A.surfers.find(function(s){ return s.id===id; }); }
function getResult(sid,eid){ return A.results[eid] && A.results[eid][sid] ? A.results[eid][sid] : null; }
function getPts(sid,eid){ var r=getResult(sid,eid); var s=getSurfer(sid); if(!r||!s)return null; var rk=srank(s); return r==='win'?rk*2:r==='advance'?rk:0; }
function usedIds(){ return Object.values(A.picks); }
function activeEv(){ return A.events.find(function(e){ return e.status==='active'; })||null; }
function ini(n){ return (n||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(); }
function getCD(){
  var next = A.events.find(function(e){ return e.status==='upcoming' && e.opens_at; });
  if(!next) return null;
  var diff = new Date(next.opens_at) - new Date();
  if(diff<=0) return null;
  return {d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};
}
function calcLB(){
  var byUser={};
  A.allPicks.forEach(function(pk){ if(!byUser[pk.user_id])byUser[pk.user_id]=[]; byUser[pk.user_id].push(pk); });
  return A.profiles.map(function(p){
    var ups=byUser[p.id]||[]; var tot=0,wins=0,best=0;
    ups.forEach(function(pk){ var pv=getPts(pk.surfer_id,pk.event_id); if(pv===null)return; tot+=pv; if(pv>best)best=pv; if(getResult(pk.surfer_id,pk.event_id)==='win')wins++; });
    return {uid:p.id,name:p.name,tot:tot,wins:wins,best:best,picks:ups.length};
  }).sort(function(a,b){ return b.tot-a.tot||b.wins-a.wins||b.best-a.best; });
}

// ─── AUTH ─────────────────────────────────────────────
async function signUp(name,email,pw){
  A.busy=true;A.ae='';render();
  var r=await sb.auth.signUp({email:email,password:pw,options:{data:{name:name}}});
  A.busy=false;
  if(r.error){A.ae=r.error.message;render();return;}
  A.auth=false; toast('Welcome! Check your email to confirm. 🤙');
}
async function signIn(email,pw){
  A.busy=true;A.ae='';render();
  var r=await sb.auth.signInWithPassword({email:email,password:pw});
  A.busy=false;
  if(r.error){A.ae=r.error.message;render();return;}
  A.auth=false; toast('Welcome back! 🤙');
}
async function signOut(){ await sb.auth.signOut(); A.session=null;A.profile=null;A.picks={}; go('home'); }
async function savePick(eid,sid){
  if(!A.session)return;
  var r=await sb.from('picks').upsert({user_id:A.session.user.id,event_id:eid,surfer_id:sid},{onConflict:'user_id,event_id'});
  if(r.error){toast('Error: '+r.error.message,'err');return;}
  A.picks[eid]=sid; A.sel=null;
  A.allPicks=A.allPicks.filter(function(p){return!(p.user_id===A.session.user.id&&p.event_id===eid);});
  A.allPicks.push({user_id:A.session.user.id,event_id:eid,surfer_id:sid});
  toast('Pick locked in! 🤙'); render();
}

// ─── RENDER ───────────────────────────────────────────
function show(html){ document.getElementById('app').innerHTML=html; }
function go(pg){ if((pg==='dash'||pg==='picks')&&!A.session){A.auth=true;A.am='register';render();return;} A.pg=pg;A.sel=null;render(); }
function toast(msg,t){ A.toast={msg:msg,t:t||'ok'}; render(); setTimeout(function(){A.toast=null;render();},2800); }
function openAuth(m){ A.auth=true;A.am=m;A.ae='';A.af={};render(); }
function doAuth(){ var f=A.af; if(A.am==='login')signIn(f.e,f.p); else signUp(f.n,f.e,f.p); }
function evClick(id){ var ev=A.events.find(function(e){return e.id===id;}); if(ev&&ev.status==='active'&&A.session)go('picks'); else go('schedule'); }
function pickSel(id){ A.sel=A.sel===id?null:id; render(); }
function startClock(){
  if(window._clk)clearInterval(window._clk);
  if(!getCD())return;
  window._clk=setInterval(function(){
    var cd=getCD(); if(!cd){clearInterval(window._clk);render();return;}
    var els=document.querySelectorAll('.cd'); var vals=[cd.d,cd.h,cd.m,cd.s];
    els.forEach(function(el,i){if(i<vals.length)el.textContent=String(vals[i]).padStart(2,'0');});
  },1000);
}

function render(){
  if(window._clk)clearInterval(window._clk);
  var html=buildNav()+('<div class="screen">'+buildPage()+'</div>');
  if(A.auth)html+=buildAuth();
  if(A.toast)html+=('<div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:300;background:var(--card);border:1px solid '+(A.toast.t==='err'?'rgba(255,79,94,.3)':'rgba(0,210,180,.3)')+';border-radius:9px;padding:10px 18px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:fadeUp .22s;font-size:.85rem;white-space:nowrap">'+(A.toast.t==='err'?'⚠️':'✅')+' '+A.toast.msg+'</div>');
  show(html);
  var ov=document.getElementById('ao'); if(ov)ov.addEventListener('click',function(e){if(e.target===ov){A.auth=false;A.ae='';render();}});
  startClock();
}

function buildNav(){
  var links=[{l:'Home',p:'home'},{l:'Schedule',p:'schedule'},{l:'Draw',p:'draw'}];
  if(A.session)links.push({l:'Dashboard',p:'dash'},{l:'My Picks',p:'picks'});
  links.push({l:'Leaderboard',p:'lb'},{l:'Rules',p:'rules'});
  var ls=links.map(function(x){return '<button class="nl'+(A.pg===x.p?' on':'')+'" onclick="go(\''+x.p+'\')">'+x.l+'</button>';}).join('');
  var right=A.session
    ?('<span style="font-size:.78rem;color:var(--muted);font-family:var(--fc);font-weight:600">'+(A.profile?A.profile.name.split(' ')[0]:'You')+'</span><button class="btn ghost sm" onclick="signOut()">Logout</button>')
    :('<button class="btn ghost sm" onclick="openAuth(\'login\')">Sign In</button><button class="btn teal sm" onclick="openAuth(\'register\')">Join — $40</button>');
  return '<nav><div class="logo" onclick="go(\'home\')"><span>SURF</span>PICKS<span style="font-size:.5rem;color:var(--muted);font-family:var(--fc);font-weight:700;letter-spacing:.1em;margin-left:2px;vertical-align:bottom">.COM</span></div><div class="navlinks">'+ls+'</div><div class="navr">'+right+'</div></nav>';
}

function buildPage(){
  if(A.pg==='home')return buildHome();
  if(A.pg==='schedule')return buildSchedule();
  if(A.pg==='draw')return buildDraw();
  if(A.pg==='dash'&&A.session)return buildDash();
  if(A.pg==='picks'&&A.session)return buildPicks();
  if(A.pg==='lb')return buildLB();
  if(A.pg==='rules')return buildRules();
  return buildHome();
}

// ─── HOME ─────────────────────────────────────────────
function buildHome(){
  var cd=getCD(); var ae=activeEv();
  var h='<div>';
  h+='<div style="position:relative;overflow:hidden;min-height:560px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(135deg,#0d2820,#1a5535,#0a2018);padding:44px 0 52px">';
  h+='<div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(5,14,24,1) 0%,rgba(5,14,24,.65) 45%,transparent 100%)"></div>';
  h+='<div class="page" style="position:relative;z-index:1">';
  h+='<div class="sl" style="margin-bottom:10px">2026 WSL Championship Tour Fantasy</div>';
  if(ae){
    h+='<div style="font-family:var(--fd);font-size:3.8rem;line-height:.92;color:var(--white);margin-bottom:8px">'+ae.name+'</div>';
    h+='<div style="font-size:.95rem;color:rgba(255,255,255,.6);margin-bottom:20px">'+ae.flag+' '+ae.location+' · <span style="color:var(--teal)">🟢 PICKS OPEN</span></div>';

    h+='<div class="card" style="padding:40px;text-align:center"><div style="font-size:2rem;margin-bottom:8px">🌊</div><div style="font-family:var(--fd);font-size:1.3rem;color:var(--muted)">No Active Event</div></div>';
  }
  h+='</div></div></div>';
  return h;
}
function buildPicker(eid){
  var used=usedIds(); var g=A.fg; var surfers=A.surfers.filter(function(s){return s.gender===g;}); var sel=A.sel;
  var h='<div class="card" style="padding:16px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-family:var(--fc);font-weight:700;font-size:.88rem">Pick Your Surfer</div>';
  h+='<div style="display:flex;gap:4px"><button class="btn sm '+(g==='men'?'teal':'ghost')+'" onclick="A.fg=\'men\';render()">Men</button><button class="btn sm '+(g==='women'?'teal':'ghost')+'" onclick="A.fg=\'women\';render()">Women</button></div></div>';
  h+='<div style="display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto">';
  surfers.forEach(function(s){
    var isUsed=used.indexOf(s.id)>-1; var isSel=sel===s.id; var r=srank(s);
    h+='<div class="row'+(isSel?' sel':'')+(isUsed?' used':'')+'" onclick="'+(isUsed?'':'pickSel('+s.id+')')+'">';
    h+='<div style="font-family:var(--fc);font-weight:800;font-size:.9rem;min-width:22px;text-align:center;color:'+(isSel?'var(--teal)':'var(--muted)')+'">'+r+'</div>';
    h+='<div style="flex:1"><div style="font-weight:600;font-size:.85rem">'+s.name+'</div><div style="font-size:.68rem;color:var(--muted)">'+s.flag+' '+s.country+(s.is_wildcard?' · WC':'')+'</div></div>';
    h+='<div style="text-align:right;font-size:.7rem;color:var(--muted)">'+r+'/<span style="color:var(--gold)">'+r*2+'</span></div>';
    if(isUsed)h+='<span class="tag done" style="font-size:.54rem">Used</span>';
    if(isSel)h+='<div style="width:16px;height:16px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#050e18;font-weight:700">✓</div>';
    h+='</div>';
  });
  h+='</div>';
  if(sel){
    var ps=getSurfer(sel);
    h+='<div style="margin-top:10px;padding:10px 12px;background:rgba(0,210,180,.06);border:1px solid rgba(0,210,180,.18);border-radius:7px;display:flex;align-items:center;justify-content:space-between">';
    h+='<div style="font-size:.83rem">Lock in <strong style="color:var(--teal)">'+(ps?ps.name:'')+'</strong>?</div>';
    h+='<div style="display:flex;gap:5px"><button class="btn ghost sm" onclick="A.sel=null;render()">Cancel</button><button class="btn teal sm" onclick="savePick('+eid+','+sel+')">Confirm ✓</button></div></div>';
  }
  h+='</div>';
  return h;
}

// ─── LEADERBOARD ──────────────────────────────────────
function buildLB(){
  var rows=calcLB(); var anyScores=rows.some(function(r){return r.tot>0;}); var done=A.events.filter(function(e){return e.status==='completed';}).length;
  var h='<div class="page" style="padding-top:26px;padding-bottom:48px"><div style="margin-bottom:18px"><div class="sl">Season Standings</div><div style="font-family:var(--fd);font-size:2.5rem">Leaderboard</div></div>';
  if(!anyScores)h+='<div class="card" style="margin-bottom:14px;padding:14px;border-color:rgba(245,166,35,.2)"><div style="font-family:var(--fc);font-weight:700;font-size:.82rem;color:var(--gold)">⏳ Season Starts April 1</div><div style="font-size:.78rem;color:var(--muted);margin-top:2px">Updates automatically as events complete.</div></div>';
  if(rows.length===0){h+='<div class="card" style="padding:40px;text-align:center"><div style="font-size:2rem;margin-bottom:8px">🏄</div><div style="font-family:var(--fd);font-size:1.4rem;color:var(--muted)">No players yet — be the first!</div></div>';h+='</div>';return h;}
  h+='<div class="card">';
  if(rows.length>=3){
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--b2)">';
    rows.slice(0,3).forEach(function(row,i){
      h+='<div style="padding:18px;text-align:center;'+(i<2?'border-right:1px solid var(--b2)':'')+'"><div style="font-family:var(--fd);font-size:'+(i===0?'2':'1.5')+'rem;color:'+(i===0?'var(--gold)':i===1?'#bbb':'#cd7f32')+'">#'+(i+1)+'</div><div class="av" style="margin:7px auto">'+ini(row.name)+'</div><div style="font-weight:600;font-size:.84rem">'+row.name+'</div><div style="font-family:var(--fd);font-size:'+(i===0?'1.9':'1.4')+'rem;color:var(--teal);line-height:1;margin-top:3px">'+(anyScores?row.tot:'—')+'</div></div>';
    });
    h+='</div>';
  }
  h+='<div class="lbg lbh"><div>#</div><div>Player</div><div style="text-align:right">Pts</div><div style="text-align:right">Wins</div><div style="text-align:right">Best</div></div>';
  rows.forEach(function(row,i){
    var isMe=A.session&&row.uid===A.session.user.id;
    h+='<div class="lbg lbr'+(isMe?' me':'')+'"><div style="font-family:var(--fc);font-weight:700;font-size:.85rem;color:'+(i<3?'var(--gold)':'var(--muted)')+'">'+[' 🥇',' 🥈',' 🥉'][i]||(i+1)+'</div>';
    h+='<div style="display:flex;align-items:center;gap:7px"><div class="av" style="width:26px;height:26px;font-size:.65rem">'+ini(row.name)+'</div><span>'+row.name+(isMe?' <span style="color:var(--teal);font-size:.7rem">(you)</span>':'')+'</span></div>';
    h+='<div style="text-align:right;font-family:var(--fd);font-size:1.2rem;color:var(--teal)">'+(anyScores?row.tot:'—')+'</div>';
    h+='<div style="text-align:right;font-size:.84rem;color:var(--muted)">'+(anyScores?row.wins:'—')+'</div>';
    h+='<div style="text-align:right;font-size:.84rem;color:var(--muted)">'+(anyScores?row.best:'—')+'</div></div>';
  });
  h+='</div><div style="margin-top:10px;text-align:center;font-size:.72rem;color:var(--dim)">'+done+' of 12 events scored · Real-time</div></div>';
  return h;
}

// ─── RULES ────────────────────────────────────────────
function buildRules(){
  return '<div class="page" style="padding-top:28px;padding-bottom:48px;max-width:740px"><div style="margin-bottom:22px"><div class="sl">Documentation</div><div style="font-family:var(--fd);font-size:2.5rem">How It Works</div></div><div class="card" style="padding:22px;margin-bottom:10px;border-color:rgba(0,210,180,.2)"><div style="font-family:var(--fd);font-size:1.45rem;color:var(--teal);margin-bottom:12px">🎯 Main Event — Season Long ($40)</div><div style="font-size:.84rem;color:rgba(255,255,255,.7);line-height:1.7">Pick 1 surfer per event. Cannot repeat a surfer across all 12 events.<br><br><b style="color:var(--white)">Advance past R1</b> → earn their CT rank as points.<br><b style="color:var(--white)">Win the event</b> → earn rank × 2 points.<br><b style="color:var(--coral)">Lose in R1</b> → eliminated. Repechage buyback = $20.<br><br><b style="color:var(--gold)">Prize:</b> $10,000 + 3-board PYZEL quiver.</div></div><div class="card" style="padding:22px;border-color:rgba(245,166,35,.2)"><div style="font-family:var(--fd);font-size:1.45rem;color:var(--gold);margin-bottom:12px">🔥 Single Contest — Per Event ($10)</div><div style="font-size:.84rem;color:rgba(255,255,255,.7);line-height:1.7">Pick 3 surfers per event. ALL 3 must advance past R1 or score = zero.<br><br>Score = sum of all 3 surfers\' CT ranks. Any winner scores rank × 2.<br><br><b style="color:var(--gold)">Prize:</b> $500 per event winner.</div></div></div>';
}

// ─── AUTH MODAL ───────────────────────────────────────
function buildAuth(){
  var m=A.am; var f=A.af;
  var h='<div class="ov" id="ao"><div class="modal">';
  h+='<div style="text-align:center;margin-bottom:20px"><div style="font-family:var(--fd);font-size:1.9rem;color:var(--teal)">'+(m==='login'?'WELCOME BACK':'JOIN SURFPICKS')+'</div><div style="font-size:.8rem;color:var(--muted);margin-top:3px">'+(m==='login'?'Sign in to your account':'2026 WSL Fantasy · $40 entry')+'</div></div>';
  h+='<div style="display:flex;flex-direction:column;gap:9px">';
  if(m==='register')h+='<input id="an" placeholder="Your name" value="'+(f.n||'')+'" oninput="A.af.n=this.value"/>';
  h+='<input id="ae" type="email" placeholder="Email" value="'+(f.e||'')+'" oninput="A.af.e=this.value"/>';
  h+='<input id="ap" type="password" placeholder="Password" value="'+(f.p||'')+'" oninput="A.af.p=this.value" onkeydown="if(event.key===\'Enter\')doAuth()"/>';
  h+='</div>';
  if(A.ae)h+='<div style="margin-top:10px;padding:8px 11px;background:rgba(255,79,94,.1);border:1px solid rgba(255,79,94,.2);border-radius:6px;font-size:.8rem;color:var(--coral)">'+A.ae+'</div>';
  h+='<button class="btn teal" style="width:100%;margin-top:13px;padding:12px" onclick="doAuth()" '+(A.busy?'disabled':'')+'>'+(A.busy?'Loading…':m==='login'?'Sign In':'Create Account')+'</button>';
  h+='<div style="text-align:center;margin-top:11px;font-size:.78rem;color:var(--muted)">'+(m==='login'?'No account? ':'Already have one? ')+'<span style="color:var(--teal);cursor:pointer;text-decoration:underline" onclick="A.am=\''+(m==='login'?'register':'login')+'\';A.ae=\'\';render()">'+(m==='login'?'Sign up':'Sign in')+'</span></div>';
  h+='<div style="text-align:center;margin-top:8px"><span style="font-size:.7rem;color:var(--dim);cursor:pointer" onclick="A.auth=false;render()">← Close</span></div>';
  h+='</div></div>';
  return h;
}

window.go=go; window.openAuth=openAuth; window.signOut=signOut; window.doAuth=doAuth;
window.evClick=evClick; window.pickSel=pickSel; window.savePick=savePick;
window.A=A; window.render=render;
</script>
