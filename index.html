.spinner{width:28px;height:28px;border:3px solid rgba(0,210,180,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@media(max-width:680px){.nav-links{display:none}}

<script>

// ══════════════════════════════════

const W_R2=[{h:1,s:["Caroline Marks 🇺🇸","R1H2 Winner"]},{h:2,s:["BSJ 🌺","R1H5 Winner"]},{h:3,s:["Gabriela Bryan 🌺","R1H3 Winner"]},{h:4,s:["Tyler Wright 🇦🇺","R1H7 Winner"]},{h:5,s:["Molly Picklum 🇦🇺","R1H1 Winner"]},{h:6,s:["Erin Brooks 🇨🇦","R1H8 Winner"]},{h:7,s:["Caitlin Simmers 🇺🇸","R1H4 Winner"]},{h:8,s:["Isabella Nichols 🇦🇺","R1H6 Winner"]}];

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let sb;
let D={session:null,profile:null,events:[],surfers:[],results:{},picks:{},allPicks:[],profiles:[],screen:'landing',showAuth:false,authMode:'register',authForm:{},authErr:'',authBusy:false,selSurfer:null,filterGender:'men',drawTab:'mr1',drawGender:'men',picksTab:'main',toast:null};

// ══════════════════════════════════
// BOOT
// ══════════════════════════════════
window.addEventListener('load',async()=>{
  if(typeof supabase==='undefined'){showFatal('Supabase SDK failed to load. Please refresh the page.');return;}
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
  try{const{data:{session}}=await sb.auth.getSession();D.session=session;}catch(e){}
  await loadAll();
  sb.channel('db')
    .on('postgres_changes',{event:'*',schema:'public',table:'results'},async()=>{await loadResults();await loadAllPicks();render();})
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'events'},async()=>{await loadEvents();render();})
    .subscribe();
  sb.auth.onAuthStateChange(async(event,session)=>{D.session=session;if(session){await loadProfile();await loadMyPicks();}else{D.profile=null;D.picks={};}render();});
  render();
});

// ══════════════════════════════════
// LOADERS
// ══════════════════════════════════
async function loadAll(){
  const jobs=[loadEvents(),loadSurfers(),loadResults(),loadAllPicks(),loadProfiles()];
  if(D.session)jobs.push(loadProfile(),loadMyPicks());
  await Promise.allSettled(jobs);
}
async function loadEvents(){const{data}=await sb.from('events').select('*').order('stop_num');D.events=data||[];}
async function loadSurfers(){const{data}=await sb.from('surfers').select('*');D.surfers=(data||[]).sort((a,b)=>rk(a)-rk(b));}
async function loadResults(){const{data}=await sb.from('results').select('*');D.results={};for(const r of(data||[])){if(!D.results[r.event_id])D.results[r.event_id]={};D.results[r.event_id][r.surfer_id]=r.result;}}
async function loadProfile(){if(!D.session?.user?.id)return;const{data}=await sb.from('profiles').select('*').eq('id',D.session.user.id).single();D.profile=data;}
async function loadMyPicks(){if(!D.session?.user?.id)return;const{data}=await sb.from('picks').select('event_id,surfer_id').eq('user_id',D.session.user.id);D.picks={};for(const p of(data||[]))D.picks[p.event_id]=p.surfer_id;}
async function loadAllPicks(){const{data}=await sb.from('picks').select('user_id,event_id,surfer_id');D.allPicks=data||[];}
async function loadProfiles(){const{data}=await sb.from('profiles').select('id,name');D.profiles=data||[];}

// ══════════════════════════════════
// SCORING (no view — JS computed)
// ══════════════════════════════════
function rk(s){return s.rank||s.surfer_rank||s.ct_rank||0;}
function getResult(sid,eid){return D.results[eid]?.[sid]||null;}
function getPts(sid,eid){const r=getResult(sid,eid);const s=D.surfers.find(x=>x.id===sid);if(!r||!s)return null;return r==='win'?rk(s)*2:r==='advance'?rk(s):0;}
function usedIds(){return Object.values(D.picks);}
function activeEvent(){return D.events.find(e=>e.status==='active')||null;}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getCD(){const next=D.events.find(e=>e.status==='upcoming'&&e.opens_at);if(!next)return null;const diff=new Date(next.opens_at)-new Date();if(diff<=0)return null;return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};}
function calcLB(){
  const byUser={};
  for(const pk of D.allPicks){if(!byUser[pk.user_id])byUser[pk.user_id]=[];byUser[pk.user_id].push(pk);}
  return D.profiles.map(p=>{
    const ups=byUser[p.id]||[];let tot=0,wins=0,best=0;
    for(const pk of ups){const pv=getPts(pk.surfer_id,pk.event_id);if(pv===null)continue;tot+=pv;if(pv>best)best=pv;if(getResult(pk.surfer_id,pk.event_id)==='win')wins++;}
    return{user_id:p.id,name:p.name,total_points:tot,event_wins:wins,best_score:best,picks_made:ups.length};
  }).sort((a,b)=>b.total_points-a.total_points||b.event_wins-a.event_wins||b.best_score-a.best_score);
}

// ══════════════════════════════════
// AUTH
// ══════════════════════════════════
async function doSignUp(name,email,pw){D.authBusy=true;D.authErr='';render();const{error}=await sb.auth.signUp({email,password:pw,options:{data:{name}}});D.authBusy=false;if(error){D.authErr=error.message;render();return;}D.showAuth=false;toast('Welcome to SurfPicks! 🤙 Check your email.');}
async function doSignIn(email,pw){D.authBusy=true;D.authErr='';render();const{error}=await sb.auth.signInWithPassword({email,password:pw});D.authBusy=false;if(error){D.authErr=error.message;render();return;}D.showAuth=false;toast('Welcome back! 🤙');}
async function doSignOut(){await sb.auth.signOut();D.session=null;D.profile=null;D.picks={};go('landing');}
async function savePick(eid,sid){if(!D.session)return;const{error}=await sb.from('picks').upsert({user_id:D.session.user.id,event_id:eid,surfer_id:sid},{onConflict:'user_id,event_id'});if(error){toast('Error: '+error.message,'err');return;}D.picks[eid]=sid;D.selSurfer=null;D.allPicks=D.allPicks.filter(p=>!(p.user_id===D.session.user.id&&p.event_id===eid));D.allPicks.push({user_id:D.session.user.id,event_id:eid,surfer_id:sid});toast('Pick locked in! 🤙');render();}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════
function go(sc){if(['dash','picks'].includes(sc)&&!D.session){D.showAuth=true;D.authMode='register';render();return;}D.screen=sc;D.selSurfer=null;render();}
function toast(msg,type='ok'){D.toast={msg,type};render();setTimeout(()=>{D.toast=null;render();},2800);}
function openAuth(mode){D.showAuth=true;D.authMode=mode;D.authErr='';D.authForm={};render();}
function submitAuth(){const f=D.authForm||{};D.authMode==='login'?doSignIn(f.email,f.pw):doSignUp(f.name,f.email,f.pw);}
function evClick(id){const ev=D.events.find(e=>e.id===id);if(ev?.status==='active'&&D.session)go('picks');else go('schedule');}
function pickSurfer(id){D.selSurfer=D.selSurfer===id?null:id;render();}
function showFatal(msg){document.getElementById('root').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center"><div><div style="font-size:2rem;margin-bottom:12px">🌊</div><div style="font-family:sans-serif;color:#ff4f5e">${msg}</div></div></div>`;}

function render(){
  if(window._clk)clearInterval(window._clk);
  document.getElementById('root').innerHTML=buildPage();
  const ov=document.getElementById('auth-overlay');
  if(ov)ov.addEventListener('click',e=>{if(e.target===ov){D.showAuth=false;D.authErr='';render();}});
  startClock();
}

function startClock(){
  if(!getCD())return;
  window._clk=setInterval(()=>{
    const cd=getCD();if(!cd){clearInterval(window._clk);render();return;}
    document.querySelectorAll('.cd-num').forEach((el,i)=>{const v=[cd.d,cd.h,cd.m,cd.s];if(i<v.length)el.textContent=String(v[i]).padStart(2,'0');});
  },1000);
}

function buildPage(){
  return buildNav()+`<div class="screen">${buildScreen()}</div>`+(D.showAuth?buildAuth():'')+(D.toast?`<div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:var(--card);border:1px solid ${D.toast.type==='err'?'rgba(255,79,94,.3)':'rgba(0,210,180,.3)'};border-radius:9px;padding:10px 18px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:fadeUp .22s ease;font-size:.85rem;white-space:nowrap">${D.toast.type==='err'?'⚠️':'✅'} ${D.toast.msg}</div>`:'');
}

function buildNav(){
  const links=[{l:'Home',k:'landing'},{l:'Schedule',k:'schedule'},{l:'Draw',k:'draw'},...(D.session?[{l:'Dashboard',k:'dash'},{l:'My Picks',k:'picks'}]:[]),{l:'Leaderboard',k:'lb'},{l:'Rules',k:'rules'}];
  return `<nav id="nav"><div class="logo" onclick="go('landing')"><span class="logo-s">SURF</span><span class="logo-p">PICKS</span><span class="logo-d">.COM</span></div><div class="nav-links">${links.map(l=>`<button class="nlink${D.screen===l.k?' on':''}" onclick="go('${l.k}')">${l.l}</button>`).join('')}</div><div class="nav-r">${D.session?`<span style="font-size:.78rem;color:var(--muted);font-family:var(--fc);font-weight:600">${(D.profile?.name||'').split(' ')[0]||'You'}</span><button class="btn bg bsm" onclick="doSignOut()">Logout</button>`:`<button class="btn bg bsm" onclick="openAuth('login')">Sign In</button><button class="btn bt bsm" onclick="openAuth('register')">Join — $40</button>`}</div></nav>`;
}

function buildScreen(){
  switch(D.screen){
    case'landing':return buildLanding();
    case'schedule':return buildSchedule();
    case'draw':return buildDraw();
    case'dash':return D.session?buildDash():buildLanding();
    case'picks':return D.session?buildPicks():buildLanding();
    case'lb':return buildLB();
    case'rules':return buildRules();
    default:return buildLanding();
  }
}

function buildLanding(){

function buildSchedule(){
  return `<div class="page" style="padding-top:28px;padding-bottom:48px"><div style="margin-bottom:20px"><div class="sl">2026 Championship Tour</div><div style="font-family:var(--fd);font-size:2.6rem;margin-top:2px">Full Schedule</div></div><div style="display:flex;flex-direction:column;gap:3px">${D.events.length===0?`<div class="card" style="padding:32px;text-align:center"><div class="spinner" style="margin:0 auto 12px"></div><div style="color:var(--muted);font-family:var(--fc)">Loading events…</div></div>`:D.events.map((ev,i)=>evRow(ev,i)).join('')}</div></div>`;
}

function evRow(ev,i){
  const isA=ev.status==='active',isD=ev.status==='completed';
  const stag=isA?`<span class="tag tg-live">🔴 LIVE</span>`:isD?`<span class="tag tg-done">✓</span>`:`<span class="tag tg-soon">Upcoming</span>`;
  const ttag=ev.event_type==='postseason'?`<span class="tag" style="background:rgba(124,92,252,.1);color:var(--purple);border:1px solid rgba(124,92,252,.22)">Post</span>`:ev.event_type==='finale'?`<span class="tag tg-win">🏆</span>`:'';
  const sid=D.picks[ev.id];const s=sid?D.surfers.find(x=>x.id===sid):null;
  const pv=s?getPts(s.id,ev.id):null;const pr=s?getResult(s.id,ev.id):null;
  const bg=ev.bg_gradient||'linear-gradient(135deg,#0a0820,#181438)';
  return `<div style="height:110px;position:relative;overflow:hidden;border-radius:10px;cursor:pointer;display:flex;align-items:stretch" onclick="evClick(${ev.id})">
  <div style="position:absolute;inset:0;background:${bg}"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(5,14,24,.92) 40%,rgba(5,14,24,.25) 100%)"></div>
  <div style="position:absolute;right:150px;top:50%;transform:translateY(-50%);font-family:var(--fd);font-size:5rem;color:rgba(255,255,255,.04);line-height:1;pointer-events:none">${ev.stop_num}</div>
  <div style="position:relative;z-index:1;padding:16px 22px;flex:1;display:flex;flex-direction:column;justify-content:center">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">${stag}${ttag}<span style="font-size:.7rem;color:rgba(255,255,255,.38)">${ev.date_range}</span></div>
    <div style="font-family:var(--fc);font-weight:600;font-size:.7rem;color:rgba(255,255,255,.28);margin-bottom:1px">Stop ${ev.stop_num}</div>
    <div style="font-family:var(--fd);font-size:1.6rem;line-height:1;color:var(--white)">${ev.name}</div>
    <div style="font-size:.78rem;color:rgba(255,255,255,.5);margin-top:2px">${ev.flag} ${ev.location}</div>
  </div>
  <div style="position:relative;z-index:1;padding:16px 20px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;min-width:150px">
    ${s?`<div style="text-align:right"><div style="font-family:var(--fc);font-weight:700;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">My Pick</div><div style="font-size:.88rem;font-weight:600">${s.name}</div>${pv!==null?`<div style="font-family:var(--fd);font-size:1.5rem;color:${pv>0?'var(--teal)':'var(--muted)'}">${pv}pts</div>`:''}${pr?`<span class="tag ${pr==='win'?'tg-win':pr==='elim'?'tg-elim':'tg-adv'}">${pr==='win'?'🏆 WIN':pr==='elim'?'💀 OUT':'ADV'}</span>`:''}</div>`:isA&&D.session?`<button class="btn bt bsm" onclick="event.stopPropagation();go('picks')">Pick →</button>`:`<span style="font-size:.72rem;color:rgba(255,255,255,.18);font-family:var(--fc)">${(ev.date_range||'').split('–')[0]}</span>`}
  </div></div>`;
}

function buildDraw(){
  const tab=D.drawTab;
  const tabs=[{k:'mr1',l:'Men R1'},{k:'mr2',l:'Men R2'},{k:'wr1',l:'Women R1'},{k:'wr2',l:'Women R2'},{k:'roster',l:'Full Roster'}];
  return `<div class="page" style="padding-top:28px;padding-bottom:48px"><div style="margin-bottom:18px"><div class="sl">Official WSL Bracket · Stop 1</div><div style="font-family:var(--fd);font-size:2.4rem;margin-top:2px">Bells Beach Heat Draw</div><div style="font-size:.82rem;color:var(--muted);margin-top:2px">🇦🇺 April 1–11, 2026 · 36 Men / 24 Women</div></div>
  <div class="tbar" style="margin-bottom:16px">${tabs.map(t=>`<button class="tab${tab===t.k?' ta':''}" onclick="D.drawTab='${t.k}';render()">${t.l}</button>`).join('')}</div>
  ${tab==='mr1'?dr1(M_R1):tab==='mr2'?dr2(M_R2):tab==='wr1'?dr1(W_R1):tab==='wr2'?dr2(W_R2):buildRoster()}</div>`;
}

function dr1(heats){return `<div style="display:grid;grid-template-columns:${heats.length<=4?'repeat(2,1fr)':'repeat(3,1fr)'};gap:8px">${heats.map(h=>`<div class="hcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-family:var(--fd);font-size:1.2rem">Heat ${h.h}</div><div style="font-size:.68rem;color:var(--muted)">${h.adv}</div></div><span class="tag tg-soon">Upcoming</span></div>${h.s.map((sf,i)=>`<div class="hs" style="${i===0?'margin-bottom:4px':''}"><div style="font-size:.9rem;font-weight:600;flex:1">${sf.f} ${sf.n}</div>${sf.wc?`<span style="font-size:.6rem;font-family:var(--fc);font-weight:700;color:var(--gold);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);padding:2px 5px;border-radius:3px">WC</span>`:''}</div>${i===0?`<div style="text-align:center;font-size:.65rem;color:var(--dim);font-family:var(--fc);font-weight:700;padding:2px 0">VS</div>`:''}`).join('')}</div>`).join('')}</div>`;}

function dr2(heats){return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">${heats.map(h=>`<div class="hcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-family:var(--fd);font-size:1.1rem">R2·${h.h}</div><span class="tag tg-soon" style="font-size:.56rem">Upcoming</span></div>${h.s.map((s,i)=>`<div class="hs" style="padding:6px 8px;${i===0?'margin-bottom:3px':''}"><div style="font-size:${s.startsWith('R1H')?'.76':'.86'}rem;font-weight:${s.startsWith('R1H')?400:600};color:${s.startsWith('R1H')?'var(--muted)':'var(--white)'}">${s}</div></div>${i===0?`<div style="text-align:center;font-size:.65rem;color:var(--dim);font-family:var(--fc);font-weight:700;line-height:1.2">VS</div>`:''}`).join('')}</div>`).join('')}</div>`;}

function buildRoster(){
  const g=D.drawGender;const surfers=D.surfers.filter(s=>s.gender===g);
  return `<div><div style="display:flex;gap:6px;margin-bottom:14px"><button class="btn bsm ${g==='men'?'bt':'bg'}" onclick="D.drawGender='men';render()">Men's CT (${D.surfers.filter(s=>s.gender==='men').length})</button><button class="btn bsm ${g==='women'?'bt':'bg'}" onclick="D.drawGender='women';render()">Women's CT (${D.surfers.filter(s=>s.gender==='women').length})</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">${surfers.map(s=>{const r=rk(s);return`<div class="hs" style="padding:8px 11px"><div style="font-family:var(--fc);font-weight:800;font-size:.85rem;min-width:24px;color:${r<=8?'var(--teal)':r<=28?'var(--white)':'var(--muted)'}">${r}</div><div style="flex:1"><div style="font-size:.86rem;font-weight:600">${s.name}</div><div style="font-size:.68rem;color:var(--muted)">${s.flag} ${s.country}</div></div>${s.is_wildcard?`<span style="font-size:.58rem;font-family:var(--fc);font-weight:700;color:var(--gold);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);padding:1px 5px;border-radius:3px">WC</span>`:''}<div style="font-size:.7rem;color:var(--muted)">${r}/${r*2}pts</div></div>`;}).join('')}</div></div>`;
}

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px">${[{n:me?.total_points||0,l:'Total Points',c:'var(--teal)'},{n:`#${myRank}`,l:'Season Rank',c:'var(--gold)'},{n:me?.event_wins||0,l:'Event Wins',c:'var(--teal)'},{n:`${Object.keys(D.picks).length}/12`,l:'Picks Used',c:'var(--muted)'}].map(s=>`<div style="display:flex;flex-direction:column;align-items:center;padding:13px;background:var(--card2);border:1px solid var(--b2);border-radius:10px"><div style="font-family:var(--fd);font-size:1.9rem;line-height:1;color:${s.c}">${s.n}</div><div style="font-family:var(--fc);font-weight:600;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px">${s.l}</div></div>`).join('')}</div>

function buildPicks(){
  const cd=getCD();const tab=D.picksTab;
  return `<div class="page" style="padding-top:24px;padding-bottom:48px"><div style="margin-bottom:18px"><div class="sl">Entry</div><div style="font-family:var(--fd);font-size:2.2rem">My Picks</div></div>${cd?`<div class="card" style="padding:16px;margin-bottom:14px;border-color:rgba(245,166,35,.2)"><div style="display:flex;align-items:center;gap:12px"><div style="font-size:1.3rem">🔒</div><div><div style="font-family:var(--fc);font-weight:700;color:var(--gold)">Picks Open April 1</div><div style="font-size:.8rem;color:var(--muted)">Study the draw and plan your strategy.</div></div><button class="btn bo bsm" style="margin-left:auto" onclick="go('draw')">View Draw →</button></div></div>`:''}<div class="tbar" style="margin-bottom:18px"><button class="tab${tab==='main'?' ta':''}" onclick="D.picksTab='main';render()">Main Event</button><button class="tab${tab==='single'?' ta':''}" onclick="D.picksTab='single';render()">Single Contest</button></div>${tab==='main'?buildMainPicks():`<div class="card" style="padding:36px;text-align:center"><div style="font-size:2rem;margin-bottom:8px">🔥</div><div style="font-family:var(--fd);font-size:1.4rem;margin-bottom:6px">Single Contest</div><div style="font-size:.83rem;color:var(--muted)">Pick 3 surfers per event ($10). All 3 must advance past R1.</div></div>`}</div>`;

  const cd=getCD();const ae=activeEvent();
  const me=calcLB().find(r=>r.user_id===D.session?.user?.id);

}

function buildPicker(eid){
  const used=usedIds();const g=D.filterGender;const surfers=D.surfers.filter(s=>s.gender===g);const sel=D.selSurfer;
  return `<div class="card" style="padding:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-family:var(--fc);font-weight:700;font-size:.88rem">Pick Your Surfer</div><div style="display:flex;gap:4px"><button class="btn bsm ${g==='men'?'bt':'bg'}" onclick="D.filterGender='men';render()">Men</button><button class="btn bsm ${g==='women'?'bt':'bg'}" onclick="D.filterGender='women';render()">Women</button></div></div>
  <div style="display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto">${surfers.map(s=>{const isUsed=used.includes(s.id);const isSel=sel===s.id;const r=rk(s);return`<div class="sc-row${isSel?' ss':''}${isUsed?' su':''}" onclick="${isUsed?'':'pickSurfer('+s.id+')'}"><div style="font-family:var(--fc);font-weight:800;font-size:.9rem;min-width:22px;text-align:center;color:${isSel?'var(--teal)':'var(--muted)'}">${r}</div><div style="flex:1"><div style="font-weight:600;font-size:.85rem">${s.name}</div><div style="font-size:.68rem;color:var(--muted)">${s.flag} ${s.country}${s.is_wildcard?' · WC':''}</div></div><div style="text-align:right;font-size:.7rem;color:var(--muted)">${r}/<span style="color:var(--gold)">${r*2}</span></div>${isUsed?`<span class="tag tg-done" style="font-size:.54rem">Used</span>`:''}${isSel?`<div style="width:16px;height:16px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#050e18;font-weight:700">✓</div>`:''}</div>`;}).join('')}</div>
  ${sel?`<div style="margin-top:10px;padding:10px 12px;background:rgba(0,210,180,.06);border:1px solid rgba(0,210,180,.18);border-radius:7px;display:flex;align-items:center;justify-content:space-between"><div style="font-size:.83rem">Lock in <strong style="color:var(--teal)">${D.surfers.find(s=>s.id===sel)?.name}</strong>?</div><div style="display:flex;gap:5px"><button class="btn bg bsm" onclick="D.selSurfer=null;render()">Cancel</button><button class="btn bt bsm" onclick="savePick(${eid},${sel})">Confirm ✓</button></div></div>`:''}</div>`;
}

function buildLB(){
  const rows=calcLB();const anyScores=rows.some(r=>r.total_points>0);const done=D.events.filter(e=>e.status==='completed').length;
  return `<div class="page" style="padding-top:26px;padding-bottom:48px"><div style="margin-bottom:18px"><div class="sl">Season Standings</div><div style="font-family:var(--fd);font-size:2.5rem">Leaderboard</div></div>${!anyScores?`<div class="card" style="margin-bottom:14px;padding:14px;border-color:rgba(245,166,35,.2)"><div style="font-family:var(--fc);font-weight:700;font-size:.82rem;color:var(--gold)">⏳ Season Starts April 1</div><div style="font-size:.78rem;color:var(--muted);margin-top:2px">Updates automatically as events complete. Real-time for everyone.</div></div>`:''}${rows.length===0?`<div class="card" style="padding:40px;text-align:center"><div style="font-size:2rem;margin-bottom:8px">🏄‍♂️</div><div style="font-family:var(--fd);font-size:1.4rem;color:var(--muted)">No players yet — be the first!</div></div>`:`<div class="card">${rows.length>=3?`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--b2)">${rows.slice(0,3).map((row,i)=>`<div style="padding:18px;text-align:center;${i<2?'border-right:1px solid var(--b2)':''}"><div style="font-family:var(--fd);font-size:${i===0?'2':'1.5'}rem;color:${i===0?'var(--gold)':i===1?'#bbb':'#cd7f32'}">#${i+1}</div><div class="av" style="margin:7px auto">${ini(row.name)}</div><div style="font-weight:600;font-size:.84rem">${row.name}</div><div style="font-family:var(--fd);font-size:${i===0?'1.9':'1.4'}rem;color:var(--teal);line-height:1;margin-top:3px">${anyScores?row.total_points:'—'}</div></div>`).join('')}</div>`:''}
  <div class="lbh"><div>#</div><div>Player</div><div style="text-align:right">Pts</div><div style="text-align:right">Wins</div><div style="text-align:right">Best</div></div>
  ${rows.map((row,i)=>{const isMe=D.session&&row.user_id===D.session.user.id;return`<div class="lbr${isMe?' me':''}"><div style="font-family:var(--fc);font-weight:700;font-size:.85rem;color:${i<3?'var(--gold)':'var(--muted)'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div><div style="display:flex;align-items:center;gap:7px"><div class="av" style="width:26px;height:26px;font-size:.65rem">${ini(row.name)}</div><span>${row.name}${isMe?` <span style="color:var(--teal);font-size:.7rem">(you)</span>`:''}</span></div><div style="text-align:right;font-family:var(--fd);font-size:1.2rem;color:var(--teal)">${anyScores?row.total_points:'—'}</div><div style="text-align:right;font-size:.84rem;color:var(--muted)">${anyScores?row.event_wins:'—'}</div><div style="text-align:right;font-size:.84rem;color:var(--muted)">${anyScores?row.best_score:'—'}</div></div>`;}).join('')}</div>`}
  <div style="margin-top:10px;text-align:center;font-size:.72rem;color:var(--dim)">${done} of 12 events scored · Real-time updates</div></div>`;
}

function buildRules(){
  return `<div class="page" style="padding-top:28px;padding-bottom:48px;max-width:740px"><div style="margin-bottom:22px"><div class="sl">Documentation</div><div style="font-family:var(--fd);font-size:2.5rem">How It Works</div></div>
  <div class="card" style="padding:22px;margin-bottom:10px;border-color:rgba(0,210,180,.2)"><div style="font-family:var(--fd);font-size:1.45rem;color:var(--teal);margin-bottom:12px">🎯 Main Event — Season Long ($40)</div><div style="font-size:.84rem;color:rgba(255,255,255,.7);line-height:1.7">Pick 1 surfer per event. Can't repeat across all 12 events.<br><br><b style="color:var(--white)">Advance past R1</b> → earn their CT rank as points.<br><b style="color:var(--white)">Win the event</b> → earn rank × 2 points.<br><b style="color:var(--coral)">Lose in R1</b> → eliminated. Repechage buyback = $20.<br><br><b style="color:var(--gold)">Prize:</b> $10,000 + 3-board PYZEL quiver.</div></div>
  <div class="card" style="padding:22px;border-color:rgba(245,166,35,.2)"><div style="font-family:var(--fd);font-size:1.45rem;color:var(--gold);margin-bottom:12px">🔥 Single Contest — Per Event ($10)</div><div style="font-size:.84rem;color:rgba(255,255,255,.7);line-height:1.7">Pick 3 surfers per event. ALL 3 must advance past R1 or score = zero.<br><br>Score = sum of the 3 surfers' CT ranks. Any winner = rank × 2 bonus.<br><br><b style="color:var(--gold)">Prize:</b> $500 per event winner.</div></div>
  <div style="margin-top:22px;text-align:center">${D.session?`<button class="btn bt blg" onclick="go('draw')">Study the Draw →</button>`:`<button class="btn bt blg" onclick="openAuth('register')">Enter the Season →</button>`}</div></div>`;
}

function buildAuth(){
  const m=D.authMode;const f=D.authForm||{};
  return `<div class="mover" id="auth-overlay"><div class="modal"><div style="text-align:center;margin-bottom:20px"><div style="font-family:var(--fd);font-size:1.9rem;color:var(--teal)">${m==='login'?'WELCOME BACK':'JOIN SURFPICKS'}</div><div style="font-size:.8rem;color:var(--muted);margin-top:3px">${m==='login'?'Sign in to your account':'2026 WSL Fantasy · 12 events · $40 entry'}</div></div><div style="display:flex;flex-direction:column;gap:9px">${m==='register'?`<input class="inp" id="a-name" placeholder="Your name" value="${f.name||''}" oninput="D.authForm.name=this.value"/>`:''}
  <input class="inp" id="a-email" type="email" placeholder="Email" value="${f.email||''}" oninput="D.authForm.email=this.value"/><input class="inp" id="a-pw" type="password" placeholder="Password" value="${f.pw||''}" oninput="D.authForm.pw=this.value" onkeydown="if(event.key==='Enter')submitAuth()"/></div>
  ${D.authErr?`<div style="margin-top:10px;padding:8px 11px;background:rgba(255,79,94,.1);border:1px solid rgba(255,79,94,.2);border-radius:6px;font-size:.8rem;color:var(--coral)">${D.authErr}</div>`:''}
  <button class="btn bt" style="width:100%;margin-top:13px;padding:12px" onclick="submitAuth()" ${D.authBusy?'disabled':''}>${D.authBusy?'Loading…':m==='login'?'Sign In':'Create Account'}</button>
  <div style="text-align:center;margin-top:11px;font-size:.78rem;color:var(--muted)">${m==='login'?'No account? ':'Already have one? '}<span style="color:var(--teal);cursor:pointer;text-decoration:underline" onclick="D.authMode='${m==='login'?'register':'login'}';D.authErr='';render()">${m==='login'?'Sign up':'Sign in'}</span></div>
  <div style="text-align:center;margin-top:8px"><span style="font-size:.7rem;color:var(--dim);cursor:pointer" onclick="D.showAuth=false;render()">← Close</span></div></div></div>`;
}

window.go=go;window.openAuth=openAuth;window.doSignOut=doSignOut;window.submitAuth=submitAuth;
window.evClick=evClick;window.pickSurfer=pickSurfer;window.savePick=savePick;
window.D=D;window.render=render;
</script>
</body>
</html>
